# Per-gaggle workload identity (k8s-infra-shape.md §3, SEC-001/002): pods in
# this namespace run as a DISTINCT federated identity, and the secret resolver
# scopes refs per gaggle — gaggle A's pods cannot resolve gaggle B's secrets
# even with equal cluster access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: goobers-stage
  labels:
    goobers.dev/role: stage
  annotations:
    # Federation annotation for the reference substrate (AKS workload
    # identity). Vendor-neutral form: whatever binding your platform uses to
    # federate this ServiceAccount to the gaggle's cloud identity
    # (EKS: eks.amazonaws.com/role-arn, GKE: iam.gke.io/gcp-service-account).
    azure.workload.identity/client-id: CHANGE-ME
# Stage pods never talk to the Kubernetes API (§5: results flow through the
# stage contract) — no token mount, no RBAC grants at all.
automountServiceAccountToken: false
