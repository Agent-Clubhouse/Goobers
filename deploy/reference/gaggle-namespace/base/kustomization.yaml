# Per-gaggle namespace template (k8s-infra-shape.md §3: one namespace per
# gaggle, GAG-012; workload identity per gaggle, SEC-001/002; §5 deny-first
# networking). Stamp a gaggle by overlaying this base — see ../examples/.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - networkpolicies.yaml
