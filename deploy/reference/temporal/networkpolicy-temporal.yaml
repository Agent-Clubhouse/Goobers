# Temporal isolation (k8s-infra-shape.md §5: "Temporal reachable only from
# workers and operator"). Apply alongside the Helm release in the
# goobers-temporal namespace; the egress half for dedicated per-gaggle workers
# lives in ../gaggle-namespace/base/networkpolicies.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-frontend-ingress
  namespace: goobers-temporal
spec:
  # The chart labels the frontend pods app.kubernetes.io/name=temporal; scope
  # further with app.kubernetes.io/component=frontend if your chart version
  # sets it.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: temporal
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Workers + operator in the control plane (§2/§3). Pod-scoped so the
        # API pod (and anything else that lands in goobers-system) is NOT
        # admitted — §5 says workers and operator only, and this ingress half
        # must enforce that without leaning on source-side egress policies.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: goobers-system
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - operator
                  - worker
        # Dedicated per-gaggle workers (G2 mode, #656): gaggle namespaces
        # carry the goobers.dev/gaggle label stamped by the template. Only
        # worker-role pods are admitted — stage pods run untrusted agent
        # output and must never reach the unauthenticated frontend, even if
        # their namespace's egress policy is widened or the CNI enforces
        # ingress only.
        - namespaceSelector:
            matchExpressions:
              - key: goobers.dev/gaggle
                operator: Exists
          podSelector:
            matchLabels:
              goobers.dev/role: worker
      ports:
        - protocol: TCP
          port: 7233
