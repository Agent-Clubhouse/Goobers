apiVersion: goobers.dev/v1alpha1
kind: Goober
metadata:
  name: nominator
spec:
  gaggle: goobers
  role: nominator
  displayName: Nominator
  instructions: instructions.md
  harness: copilot
  model: auto
  harnessOptions: {}
  # Files issues from evidence only — never touches code or PRs. read-only on
  # telemetry, write-only (issues) on the backlog. agent:model sources the
  # Copilot model token (COPILOT_GITHUB_TOKEN) distinct from the github tool's
  # GH_TOKEN (issue #289 / multi-token creds §3.3).
  capabilities:
    - github:issues:write
    - telemetry:read
    - agent:model
  skills:
    - nomination
  tools:
    - github
    - telemetry
  scaleFactor: 1
  workflows:
    - work-nomination
