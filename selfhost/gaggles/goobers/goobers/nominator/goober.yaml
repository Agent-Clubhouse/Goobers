apiVersion: goobers.dev/v1alpha1
kind: Goober
metadata:
  name: nominator
spec:
  gaggle: goobers
  role: nominator
  displayName: Nominator
  instructions: instructions.md
  harness: copilot
  # Files issues from evidence only — never touches code or PRs. read-only on
  # telemetry, write-only (issues) on the backlog.
  capabilities:
    - github:issues:write
    - telemetry:read
  skills:
    - nomination
  tools:
    - github
    - telemetry
  scaleFactor: 1
  workflows:
    - work-nomination
