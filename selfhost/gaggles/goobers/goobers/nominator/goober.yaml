apiVersion: goobers.dev/v1alpha1
kind: Goober
metadata:
  name: nominator
spec:
  gaggle: goobers
  role: nominator
  displayName: Nominator
  instructions: instructions.md
  harness: copilot
  model: auto
  harnessOptions: {}
  # Files issues from evidence only — never touches code or PRs. The separate
  # approval authority is materialized only when the invoking workflow stage
  # explicitly opts in; the checked-in work-nomination workflow does not.
  capabilities:
    - github:issues:write
    - github:issues:approve
    - telemetry:read
    - agent:model
  skills:
    - nomination
  tools:
    - github
    - telemetry
  scaleFactor: 1
  workflows:
    - work-nomination
