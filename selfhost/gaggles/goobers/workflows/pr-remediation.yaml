# INTENTIONAL LIVE DIVERGENCE:
# The checked-in reference keeps the hourly :37 cadence,
# maxConcurrentRuns=1, and maxRunsPerHour=2. Operator-tuned live cadence and
# budget changes are deliberately not mirrored here.
apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: pr-remediation
spec:
  gaggle: goobers
  displayName: PR remediation (rebase + finding-driven rework)
  # The second executor at the whole-open-PR-set altitude (V0.5,
  # docs/design/v0/pr-lifecycle-loop.md §2/§5): re-enters on an EXISTING PR
  # merge-review flagged goobers:needs-remediation, rather than opening a new
  # one, or whose CI is failing. update-behind-pr is the API-only entrypoint:
  # it completes the mechanical stale-base case without a worktree and routes
  # everything else to gather-pr-context (issue #362), which replaces
  # implementation's query-backlog head. rebase-pr (issue #363, design doc §5
  # D3) rebases and routes on the combination of rebase outcome + verdict
  # findings; remediation-checkpoint (issue #364, design doc §6 D4/D5) runs on
  # the "needs agent" branch to detect a stuck PR (same diff pushed twice, or
  # the liberal repass budget exhausted) and escalate.
  #
  # The agentic implement/review/local-ci chain is WIRED (issue #392, design
  # doc §10's "share the goober, copy the stage wiring"): implement, the
  # review gate, local-ci and local-gate below are copied from
  # implementation.yaml and reference the same implementer/reviewer goobers.
  # They need no per-stage re-checkout of their own — an agentic stage and a
  # gate evaluator have no way to do one anyway. gather-pr-context instead
  # emits the runner's well-known `workspaceBranch` output (internal/runner's
  # WorkspaceBranchOutput), which REBINDS the branch every later stage's
  # worktree is provisioned on, for the rest of the run, to the PR's own head
  # branch. That reuses the existing #133 continuity mechanism — a run's
  # stages share one BRANCH, each in its own fresh worktree — rather than
  # bolting a checkout onto each stage: the rebase rebase-pr performs but
  # deliberately does not push on the substantive path survives into
  # implement, and the reviewer gate's runner-computed `git diff base...HEAD`
  # evidence is the PR's real diff.
  #
  # DOGFOOD GUARDRAIL: hourly, off a different minute than merge-review (#25
  # past) so the two decider/executor cycles don't contend for the same PR
  # mid-read; this instance's open-PR volume is low, so hourly is ample.
  triggers:
    - type: schedule
      schedule: "37 * * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 2
  start: update-behind-pr
  tasks:
    # Cheap API-only lane (#720): this scratch stage selects by the same
    # priority rules as gather-pr-context and uses GitHub's update-branch
    # endpoint when the candidate is behind, mergeable, CI-clean, and carries
    # no substantive finding. It terminates after that provider mutation, so no
    # repository worktree or rebase stage is provisioned for the dominant
    # mechanical-update case. Anything non-trivial falls through unchanged.
    - name: update-behind-pr
      type: deterministic
      goal: Update a clean behind-base PR through the provider API, or route it to full remediation.
      run:
        command: ["goobers", "update-behind-pr"]
        workspace: scratch
      inputs:
        resultFile: "update-behind-result.json"
      capabilities:
        - github:pr:write
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        - needsFullRemediation
      next: update-behind-gate

    # Full-remediation context stage (issue #362, design doc §5): select one open, goober-
    # authored PR labeled needs-remediation or reporting failing CI, check out
    # ITS branch into this
    # run's worktree (replacing whatever branch the runner's worktree
    # provisioning defaulted to), and load the merge-review Verdict + PR-
    # thread comments + whether the base has advanced as context for the
    # rebase + finding-driven routing stage that follows (#363). Selection
    # shares pr-select's PR lease namespace so review and remediation cannot
    # race on the same PR.
    - name: gather-pr-context
      type: deterministic
      goal: Select a PR needing remediation, check out its branch, and emit the versioned remediation brief.
      run:
        command: ["goobers", "gather-pr-context"]
      inputs:
        resultFile: "remediation-brief.json"
      capabilities:
        - github:pr:write
        - github:issues:write
        - repo:push
      expectedOutputs:
        - selectedNumber
        - head
        - base
        - isBehindBase
        - hasSubstantiveFindings
        - hasFailingCI
        # The runner's branch-rebinding contract (#392): every stage after
        # this one is provisioned on the PR's own head branch. Declared here
        # so the stage-contract check enforces it — dropping it would not
        # fail any test, it would silently hand implement/review/local-ci a
        # pristine branch cut from main and remediate the wrong tree.
        - workspaceBranch
      next: rebase-pr

    # Rebase-first, finding-driven routing (issue #363, design doc §5 D3): a
    # clean rebase never suppresses a known substantive finding, and a rebase
    # conflict is itself substantive. Re-checks out the SAME PR branch
    # gather-pr-context selected (each stage gets its own fresh worktree —
    # see the file's own doc comment) before attempting anything.
    #
    #   rebase clean, no substantive finding or failing CI ->
    #     force-with-lease push, clear the label, done (back to merge-review
    #     next cycle) — rebase-gate's "pass" branch is terminal.
    #   failing CI -> push a clean rebase to retrigger CI, then route to
    #     remediation-checkpoint so a persistent failure cannot starve later
    #     candidates.
    #   rebase conflict, OR a substantive finding is present -> needs the
    #     agentic chain — rebase-gate's "fail" branch routes to
    #     remediation-checkpoint, which uses the PR's CURRENT diff (whatever
    #     rebase-pr left pushed, unchanged on this path) to detect a stuck PR
    #     BEFORE spending an agentic session on it, and then routes into
    #     implement (#392).
    #
    # selectedNumber is echoed forward in this stage's own result
    # (writeRebaseResult) alongside needsAgent/conflict: a gate never
    # updates Task.InputsFrom's upstream-Outputs chain (only a task does —
    # see apply-verdict's own doc comment for the established convention),
    # so remediation-checkpoint (after rebase-gate) can only read it if
    # THIS stage re-emits it, same as gather-sibling-context re-emitting
    # pr-select's selectedNumber two hops ahead of apply-verdict. head is
    # echoed too but not currently consumed downstream — remediation-
    # checkpoint (#393) re-lists PRs itself and reads Head from there.
    - name: rebase-pr
      type: deterministic
      goal: Rebase the selected PR onto its base; force-push and clear the label if clean, else defer to agentic remediation.
      run:
        command: ["goobers", "rebase-pr"]
      inputsFrom:
        selectedNumber: selectedNumber
        head: head
        base: base
        hasSubstantiveFindings: hasSubstantiveFindings
        hasFailingCI: hasFailingCI
      inputs:
        resultFile: "rebase-result.json"
      capabilities:
        - repo:push
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        - head
        - needsAgent
      next: rebase-gate

    # D4/D5 loop-control (issue #364, design doc §6): runs only when
    # rebase-pr couldn't finish the PR itself this cycle (rebase-gate's
    # "fail" branch — conflict or a substantive finding). Checks out the
    # PR's branch itself (its own fresh worktree, same reason as every
    # other stage here), computes its current diff against base, and
    # escalates (goobers:merge-escalated, clearing needs-remediation) if
    # that diff is byte-identical to the immediately prior recorded cycle's
    # (stuck, no progress) or the liberal repass budget is exhausted;
    # otherwise records the advanced cycle state as a new sticky comment.
    - name: remediation-checkpoint
      type: deterministic
      goal: Detect a stuck PR (no-progress repeat or budget exhaustion) and escalate, or record the advanced cycle state.
      run:
        command: ["goobers", "remediation-checkpoint"]
      inputsFrom:
        selectedNumber: selectedNumber
      inputs:
        resultFile: "checkpoint-result.json"
      capabilities:
        - github:pr:write
        - github:issues:write
        - repo:push
      expectedOutputs:
        # What checkpoint-gate branches on: "false" when this cycle escalated
        # (budget exhausted / no-progress repeat) or the PR is no longer
        # open, "true" when the agentic chain may proceed.
        - continueRemediation
        # Echoed forward for push-remediated, which sits past the agentic
        # chain: a gate never updates the InputsFrom chain, and implement/
        # local-ci each become the upstream in turn, so push-remediated
        # re-derives from this stage's durable record rather than an input.
        # headSha is the PR's remote tip BEFORE anything in this cycle
        # pushes — push-remediated's force-with-lease expectation.
        - selectedNumber
        - head
        - headSha
      next: checkpoint-gate

    # Reuse merge-review's sibling gatherer immediately before agentic work so
    # the remediator sees every open sibling's files and deterministic overlap
    # set. The command reuses the instance-wide per-head sibling memo; only its
    # unrelated verdict-cache lookup is disabled. selectedNumber flows through
    # checkpoint-gate from remediation-checkpoint.
    - name: gather-sibling-context
      type: deterministic
      goal: Load the other open PRs' touched files and overlap with the PR being remediated.
      run:
        command: ["goobers", "gather-sibling-context", "--no-verdict-cache"]
      inputsFrom:
        selectedNumber: selectedNumber
      inputs:
        resultFile: "sibling-context.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - selectedNumber
      next: implement

    # Agentic rework in a worktree provisioned on the PR's own branch (see
    # this file's top comment): the SAME implementer goober implementation.yaml
    # uses, entered on an existing PR rather than a fresh issue. Scoped to
    # repo:push only — it never talks to the issues or PR API, and it does not
    # push either (push-remediated below owns that, exactly as push-branch
    # does for implementation).
    - name: implement
      type: agentic
      goober: implementer
      goal: >-
        Remediate this pull request. The worktree is already checked out on
        the PR's own branch, rebased onto its base where that was possible.
        Read remediation-brief.json from the attached context for the full
        merge-review verdict and PR thread comments, the sibling PR file/overlap
        context (sibling-context.json), plus any rebase conflict left to
        resolve, and address EVERY
        finding in the verdict: it is a checklist, and merge-review re-verifies
        each item before the PR can become merge-ready, so a fix that only
        addresses some of them just burns another cycle. In every successful
        result, set outputs.findingResponses to a JSON-encoded array containing
        exactly one object for each original merge-review verdict finding, in
        this shape: {"finding": <1-based verdict order>, "disposition":
        "addressed"|"declined", "detail": "<what changed, or why the finding
        does not apply>"}. Emit "[]" when that verdict has no findings. This
        is a scalar JSON string, not a structured output value; the later
        respond-to-findings stage validates and publishes it. On a reviewer
        repass, replace the whole array with an updated, complete account of
        the original verdict — do not report only the new reviewer feedback.
        If the rebase
        conflicted, resolving it IS the work. Verify with fast, targeted tests
        for what you changed, and commit to the PR's branch (push is a separate
        deterministic stage — see push-remediated below). Do NOT run the full
        `make ci` / `go test -race ./...` suite in-session — the deterministic
        local-ci stage below owns that authoritatively (#724). On a repass,
        first read the reviewer rationale or CI failure evidence attached as
        context and address it before making further changes.
      capabilities:
        - repo:push
        - agent:model
      retry:
        maxAttempts: 2
        backoffSeconds: 15
      expectedOutputs:
        - findingResponses
      # Deliberately NO onTimeout: salvage, unlike implementation's otherwise
      # identical implement stage (#724). Salvage decides "was anything
      # produced?" from `git diff <repoRef.branch>...HEAD` being non-empty,
      # which holds on a run branch cut fresh from main but NOT here: this
      # worktree is on the PR's own branch, so that diff is the PR's entire
      # pre-existing content and is never empty. A session that timed out
      # having committed nothing would salvage as success, be reviewed against
      # the PR's original unfixed diff, and pass local-ci unchanged. Timing out
      # here therefore takes the ordinary retry/fail path; nothing is lost,
      # because the commits live on the PR's branch and the next cycle
      # re-selects it. (push-remediated independently refuses to publish a
      # branch that never moved, so this is defense in depth, not the only
      # guard.)
      next: review

    # The merge tier from CONTRIBUTING.md's "Validation tier contract", run on
    # the PR's branch carrying the rework.
    - name: local-ci
      type: deterministic
      goal: Run the project's local CI-equivalent (build, lint, tests) in the worktree.
      run:
        command: ["make", "ci"]
      retry:
        maxAttempts: 1
      next: local-gate

    # Publish (issue #392, design doc §5's "re-push -> clear label"). The
    # counterpart to implementation's push-branch: force-push-with-lease to
    # the PR's own head instead of a plain push to a fresh run branch, then
    # clear goobers:needs-remediation so merge-review re-evaluates the PR
    # next cycle. Runs only after local-gate passes, so a broken build is
    # never published — same ordering implementation.yaml uses.
    - name: push-remediated
      type: deterministic
      goal: Force-push (with lease) the remediated branch to the PR and clear the needs-remediation label.
      run:
        command: ["goobers", "push-remediated"]
      inputs:
        resultFile: "push-remediated-result.json"
      capabilities:
        - repo:push
        - github:pr:write
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        - published
        - head
      next: respond-to-findings

    # PRR-7 / design doc D3: publish the account only after the branch moved,
    # so every "addressed" claim describes work that actually landed. The
    # stage reads both the original verdict artifact and implement's structured
    # scalar output from this run's journal, validates exact coverage, and
    # records its complete response as the declared result-file artifact before
    # the run terminates. It is deliberately self-contained: deleting this task
    # and push-remediated's next restores the prior, still-functional silent
    # terminal without changing any other stage.
    - name: respond-to-findings
      type: deterministic
      goal: Post an auditable reply accounting for every original verdict finding after the remediated branch is published.
      run:
        command: ["goobers", "respond-to-findings"]
        workspace: scratch
      inputs:
        resultFile: "remediation-response.json"
      capabilities:
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        - sourceRunId
        - findingCount
        - posted
      retry:
        maxAttempts: 2
        backoffSeconds: 5
      # Terminal: the cycle's product — a republished PR plus its explicit
      # finding-by-finding changelog — is back in merge-review's hands. This
      # workflow never merges; merge-review owns that capability-gated path.

    # Terminal @escalate for a reviewer "fail" verdict (design doc §4 D2:
    # `fail` is a fundamentally wrong approach, and must NOT be burned on
    # remediation budget the way `needs-changes` is). Escalating here parks
    # the PR for a human immediately instead of letting it cycle up to the
    # liberal D4 budget re-attempting an approach already judged wrong.
    - name: park-escalated
      type: deterministic
      goal: Park a reviewer-rejected PR with the terminal escalation reason.
      run:
        command:
          [
            "goobers",
            "remediation-checkpoint",
            "--escalate",
            "the in-run reviewer returned a terminal `fail` verdict on this remediation attempt — the approach itself was rejected, not just its details (design doc §4 D2)",
          ]
      capabilities:
        - github:pr:write
        - github:issues:write
        - repo:push
      # @escalate, not @abort, for the same reason implementation.yaml's own
      # park-escalated is: every escalation surface (`goobers run` exit 3,
      # the read API's escalationCause, `goobers trace`) keys on
      # PhaseEscalated, so collapsing this into an abort would make a
      # reviewer-rejected remediation indistinguishable from an ordinary
      # failure.
      next: "@escalate"

  gates:
    # A completed API update is terminal. Every confirmed conflict, substantive
    # finding, failing check, or non-behind candidate enters the existing
    # gather/rebase/agentic path without changing its semantics.
    - name: update-behind-gate
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: needsFullRemediation
          equals: "false"
      branches:
        pass: ""
        fail: gather-pr-context

    # Automated branch on rebase-pr's own needsAgent output (internal/
    # gate's generic "output-equals" check — Inputs[params.key] compared to
    # params.equals; no new check needed, this already existed for exactly
    # this shape of custom-output branching).
    - name: rebase-gate
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: needsAgent
          equals: "false"
      branches:
        pass: ""
        fail: remediation-checkpoint

    # Loop-control decision (#392): remediation-checkpoint runs BEFORE the
    # agentic chain so an exhausted budget or a no-progress repeat escalates
    # without first spending an agentic session on a PR that cannot advance.
    # Its "false" branch is terminal — the PR now carries
    # goobers:merge-escalated and a human takes it from here.
    - name: checkpoint-gate
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: continueRemediation
          equals: "true"
      branches:
        pass: gather-sibling-context
        fail: ""

    # Agentic reviewer gate, the same shape and the same reviewer goober
    # implementation.yaml uses. The runner computes `git diff base...HEAD` on
    # the stage's worktree and attaches it as the reviewer's evidence — which
    # is the PR's own diff here precisely because gather-pr-context rebound
    # the workspace branch (#392). Verdicts map to branches exactly as they do
    # at issue altitude (GT-002: never a silent pass).
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
        # #765: retry a transient reviewer-harness failure (a copilot session
        # that wrote no verdict file) within this bound instead of failing the
        # run on the first occurrence. Non-transient errors still fail fast.
        retry:
          maxAttempts: 2
      branches:
        pass: local-ci
        needs-changes: implement
        fail: park-escalated
        escalate: park-escalated

    # local-ci's ResultEnvelope.Status is flattened into this gate's
    # Inputs[status] by the runner; "success" is status-equals' default
    # expected value, so no params are needed.
    - name: local-gate
      evaluator: automated
      automated:
        check: status-equals
      branches:
        pass: push-remediated
        fail: implement
        escalate: park-escalated
