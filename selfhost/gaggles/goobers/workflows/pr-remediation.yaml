apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: pr-remediation
spec:
  gaggle: goobers
  displayName: PR remediation (rebase + finding-driven rework)
  # The second executor at the whole-open-PR-set altitude (V0.5,
  # docs/design/v0/pr-lifecycle-loop.md §2/§5): re-enters on an EXISTING PR
  # merge-review flagged goobers:needs-remediation, rather than opening a new
  # one. gather-pr-context (issue #362) is the entrypoint — it replaces
  # implementation's query-backlog head. The rebase-first, finding-driven
  # routing (#363) and the durable per-PR repass budget + same-diff
  # escalation (#364) land as later stages; until then this workflow ends
  # after loading context, which is a complete, useful increment on its own
  # (the label stays set, so nothing is lost — the next run just re-gathers).
  #
  # DOGFOOD GUARDRAIL: hourly, off a different minute than merge-review (#25
  # past) so the two decider/executor cycles don't contend for the same PR
  # mid-read; this instance's open-PR volume is low, so hourly is ample.
  triggers:
    - type: schedule
      schedule: "37 * * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 2
  start: gather-pr-context
  tasks:
    # Entrypoint (issue #362, design doc §5): select one open, goober-
    # authored PR labeled needs-remediation, check out ITS branch into this
    # run's worktree (replacing whatever branch the runner's worktree
    # provisioning defaulted to), and load the merge-review Verdict + PR-
    # thread comments + whether the base has advanced as context for the
    # rebase + finding-driven routing stage that follows (#363).
    - name: gather-pr-context
      type: deterministic
      goal: Select a needs-remediation PR, check out its branch, and load review context.
      run:
        command: ["goobers", "gather-pr-context"]
      inputs:
        resultFile: "pr-context.json"
      capabilities:
        - github:pr:write
        - github:issues:write
        - repo:push
      expectedOutputs:
        - selectedNumber
        - head
        - base
        - isBehindBase
        - hasSubstantiveFindings
      next: rebase-pr

    # Rebase-first, finding-driven routing (issue #363, design doc §5 D3): a
    # clean rebase never suppresses a known substantive finding, and a rebase
    # conflict is itself substantive. Re-checks out the SAME PR branch
    # gather-pr-context selected (each stage gets its own fresh worktree —
    # see the file's own doc comment) before attempting anything.
    #
    #   rebase clean, no substantive finding -> force-with-lease push, clear
    #     the label, done (back to merge-review next cycle).
    #   rebase conflict, OR a substantive finding is present -> this needs
    #     the agentic implement/review/local-ci chain implementation.yaml
    #     already has (design doc §10: "share the goober, copy the stage
    #     wiring"). NOT YET WIRED HERE: every one of those stages ALSO gets
    #     its own fresh worktree defaulting to this workflow's OWN run
    #     branch (providers.BranchName), not the PR's actual branch, the
    #     same problem gather-pr-context/rebase-pr solve for themselves by
    #     re-checking-out explicitly — copying the chain in naively would
    #     silently operate on the wrong branch. Flagged to the team as a
    #     follow-up rather than rushed; the PR stays needs-remediation-
    #     labeled and is simply re-evaluated next cycle, which is a correct,
    #     lossless no-op, not a broken state.
    - name: rebase-pr
      type: deterministic
      goal: Rebase the selected PR onto its base; force-push and clear the label if clean, else defer to agentic remediation.
      run:
        command: ["goobers", "rebase-pr"]
      inputsFrom:
        selectedNumber: selectedNumber
        head: head
        base: base
        hasSubstantiveFindings: hasSubstantiveFindings
      inputs:
        resultFile: "rebase-result.json"
      capabilities:
        - repo:push
        - github:issues:write
      expectedOutputs:
        - needsAgent
      # Terminal for now — see this task's own doc comment above.
