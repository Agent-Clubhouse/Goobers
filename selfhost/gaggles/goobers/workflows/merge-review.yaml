# INTENTIONAL LIVE DIVERGENCE:
# The checked-in reference keeps the hourly :23 cadence and maxRunsPerHour=2.
# Operator-tuned live cadence and budget changes are deliberately not
# mirrored here. maxConcurrentRuns is NOT part of that divergence (issue
# #719): reviews of distinct PRs are already claim-ledger-safe (pr-select
# leases the PR before gather-sibling-context/review run), and only the
# merge-pr stage's own poll->decide->merge window needs serializing —
# `cmd/goobers/mergepr.go` now does that via an instance-level flock
# (mergeLockFileName), so raising this is a real code-level fix landing as
# the new checked-in default, not a live-only tuning knob.
apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: merge-review
spec:
  gaggle: goobers
  displayName: Merge review (PR-lifecycle decider)
  # The decider workflow at the whole-open-PR-set altitude (V0.5,
  # docs/design/v0/pr-lifecycle-loop.md §2-4): holistically judges one
  # eligible PR per run, with the OTHER open PRs' state as evidence, and
  # emits a #358 Verdict. A pass enters #360/#361's opt-in conjunctive
  # merge/post-merge chain; other outcomes are applied as PR feedback. Same
  # one-per-run selection shape as work-nomination/implementation, not a
  # batch pass over every open PR in one run.
  #
  # DOGFOOD GUARDRAIL: hourly, off the hour — this instance's PR volume is
  # low (a handful of goober-authored PRs at a time), so hourly gives fast
  # feedback on drift/conflicts without needing sub-hour cadence; a
  # maxRunsPerHour ceiling still bounds it if the schedule and a manual
  # `goobers run` both fire in the same window.
  triggers:
    - type: schedule
      schedule: "23 * * * *"
  readiness:
    # Issue #719: distinct-PR reviews are already claim-ledger-safe, so this
    # bound existed purely to protect the shared merge decision — now that
    # merge-pr serializes that window itself (mergeLockFileName), it no
    # longer needs to also serialize the (harmless-in-parallel) review work
    # ahead of it. 4 matches the instance's observed headroom
    # (maxParallelRuns 10, peak 8, avg 3.84 concurrent runs instance-wide)
    # and the issue's own "×3-4 throughput" target.
    maxConcurrentRuns: 4
    maxRunsPerHour: 2
  start: pr-select
  tasks:
    # Selection (design doc §3's declarative-selection model, applied to
    # PRs): one open, non-draft, green-CI goobers/* PR not already carrying
    # a merge-review label. The selected PR is leased in the same claim
    # namespace gather-pr-context uses, excluding concurrent review/remediation
    # of one PR.
    - name: pr-select
      type: deterministic
      goal: Select one eligible open PR for holistic review.
      run:
        command: ["goobers", "pr-select"]
      inputs:
        resultFile: "selected-pr.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - number
        - head
        - base
      next: gather-sibling-context

    # The cross-PR value stage (design doc §3): "this is where the cross-PR
    # value lives; without it the review degrades back to single-diff and
    # catches nothing cross-cutting." Queries every OTHER open PR's touched
    # files + state, regardless of ITS OWN eligibility (a draft or red
    # sibling is still relevant evidence).
    - name: gather-sibling-context
      type: deterministic
      goal: Load the other open PRs' touched files + state as review evidence.
      run:
        command: ["goobers", "gather-sibling-context"]
      inputsFrom:
        selectedNumber: number
      inputs:
        resultFile: "sibling-context.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        # selectedNumber is threaded to apply-verdict's inputsFrom (#413) — its
        # omission here left the declared postcondition out of sync with the
        # stage's actual result JSON. (The load-bearing fix is emitting it as a
        # string so buildStageEnv actually threads it; see prsiblingcontext.go.)
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        # reviewDigest (#523) is threaded to apply-verdict's inputsFrom too —
        # apply-verdict stamps it onto a genuinely fresh verdict before
        # posting, so the NEXT gather-sibling-context can find and reuse it.
        # cachedVerdictJson (present only on a cache hit) is deliberately NOT
        # listed here: the runner reads it straight from this stage's
        # Outputs (evaluateGate), never through a declared inputsFrom edge,
        # and it is conditional — listing a key that legitimately isn't
        # always present would misstate this stage's actual postcondition.
        - reviewDigest
      next: review

    - name: apply-verdict
      type: deterministic
      goal: Apply the review verdict's label + PR comment.
      run:
        command: ["goobers", "apply-verdict"]
      inputsFrom:
        # Threads through the preceding gate transparently: a gate never
        # updates the walk's lastResult/InputsFrom chain (only a task does).
        # Resolves against whichever task precedes it — gather-sibling-context
        # on the review gate's fail branch, elect-lander on elect-gate's
        # parked branch (#833); both emit selectedNumber+reviewDigest.
        # apply-verdict reads the gate's own Verdict back from this run's
        # journal directly (the mechanism #358's schema + internal/gate's
        # existing recordVerdict already provide, not new plumbing).
        selectedNumber: selectedNumber
        reviewDigest: reviewDigest
      capabilities:
        - github:pr:write
      # Terminal: parked/failed verdicts end as PR feedback for pr-remediation
      # or a human.

    - name: elect-lander
      type: deterministic
      goal: Elect one lander from a mutually-sibling-blocked cluster, or park the rest.
      run:
        command: ["goobers", "elect-lander"]
      inputsFrom:
        # Same transparent-gate threading as apply-verdict above: resolves
        # against gather-sibling-context's Outputs through the review gate.
        selectedNumber: selectedNumber
        selectedHeadSha: selectedHeadSha
        selectedBaseSha: selectedBaseSha
        reviewDigest: reviewDigest
      inputs:
        # #834: lander-election policy — "fifo" (lowest PR#, default) or
        # "newest" (highest PR#). An unknown value falls back to fifo. Cluster-
        # data policies (most-blockers, fewest-overlaps) are follow-ups that
        # plug into the same registry.
        electionPolicy: "fifo"
      capabilities:
        - github:pr:write
      expectedOutputs:
        # elected drives elect-gate; the rest are pass-through so BOTH successor
        # stages resolve their single-hop inputsFrom on this branch — merge-pr
        # on the elected path, apply-verdict on the parked path (the same
        # convergence pattern post-merge already uses behind merge-gate/queue-gate).
        - elected
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - reviewDigest
      next: elect-gate

    - name: merge-pr
      type: deterministic
      goal: Land the selected PR only when every independent safety conjunct still holds.
      run:
        command: ["goobers", "merge-pr"]
      inputsFrom:
        pullNumber: selectedNumber
        headSha: selectedHeadSha
        baseSha: selectedBaseSha
      inputs:
        # Only review:pass reaches this stage, so the gate decision is a
        # deterministic input rather than model-echoed data.
        verdict: "pass"
        # Set true to evaluate without attempting a merge. The
        # github:pr:merge grant remains fail-closed either way.
        advisoryMode: "false"
        resultFile: "merge-result.json"
      capabilities:
        # INSTANCE OPT-IN: this per-workflow grant enables auto-merge for this
        # instance. Without it, remove merge-pr/merge-gate/post-merge and route
        # review:pass to apply-verdict; merge-pr refuses to run without the
        # grant rather than silently acquiring merge authority.
        - github:pr:merge
      expectedOutputs:
        # landOutcome ("merged"/"enqueued", issue #758) is deliberately NOT
        # listed here — like gather-sibling-context's cachedVerdictJson, it
        # is conditional (absent on the refusal path), and listing a key
        # that legitimately isn't always present would misstate this
        # stage's actual postcondition. merge-gate's "land-outcome" check
        # reads it straight from this stage's own Outputs regardless.
        - selectedNumber
        - merged
      next: merge-gate

    - name: queue-watch
      type: deterministic
      goal: Watch a merge-queue-enqueued PR until the queue merges or evicts it.
      run:
        command: ["goobers", "merge-queue-poll"]
      inputsFrom:
        pullNumber: selectedNumber
      inputs:
        resultFile: "queue-result.json"
      capabilities:
        # github:pr:merge for the poll itself (same PR-lifecycle altitude as
        # merge-pr, watching a PR this workflow already committed to
        # landing); github:issues:write for the eviction side effect
        # (labeling goobers:needs-remediation) — a distinct authority,
        # resolved via its own token only when an eviction actually happens
        # (mergequeuepoll.go's mergeQueuePollEvicted).
        - github:pr:merge
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        # queueOutcome ("merged"/"evicted"/"timeout") is always present —
        # this stage always determines one of the three before returning
        # (mirroring ci-poll's own "always succeeds at determining an
        # outcome" philosophy) — unlike merge-pr's conditional landOutcome,
        # there is no refusal path here to omit it for.
        - queueOutcome
      next: queue-gate

    - name: post-merge
      type: deterministic
      goal: Close referenced issues and mark now-behind sibling PRs for remediation.
      run:
        command: ["goobers", "post-merge"]
      inputsFrom:
        # merge-pr deliberately echoes this value because inputsFrom is a
        # single-hop handoff and merge-gate is transparent to it (#479).
        pullNumber: selectedNumber
      capabilities:
        - github:pr:write
        - github:issues:write
      # Terminal after a successful merge.

  gates:
    # Holistic review: reuses the shared `reviewer` goober (design doc §2's
    # explicit reuse-over-new-goober call), evaluating gather-sibling-
    # context's own Outputs (the selected PR's identity/SHAs + every
    # sibling's files/state, all flattened into this gate's Inputs the same
    # way local-gate reads local-ci's Status) — NOT a single implementer's
    # diff, the in-run reviewer's usual subject. Emits the #358 Verdict
    # (decision + classed findings + SHA pin), recorded as this gate's
    # verdict artifact exactly like the in-run reviewer gate already does —
    # zero new runner plumbing.
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        # A pass enters the independently re-polled merge action. Other
        # decisions become labels/comments consumed by pr-remediation or a
        # human, rather than a same-run implementation repass.
        pass: merge-pr
        # #833: a needs-changes verdict routes through elect-lander first — if
        # it is entirely cross-PR-ordering asks and this PR is the elected
        # lander of its overlap cluster, elect-lander sends it on to merge-pr
        # (breaking the symmetric-flag deadlock); otherwise it flows to
        # apply-verdict and parks blocked-on-sibling / needs-remediation.
        needs-changes: elect-lander
        fail: apply-verdict

    - name: elect-gate
      # #833: routes elect-lander's deterministic winner-election decision.
      # elected=true -> merge-pr (this PR is the crowned lander of its
      # mutually-blocked cluster; merge-pr still independently re-verifies every
      # safety conjunct before landing); elected=false -> apply-verdict (park
      # blocked-on-sibling for a non-elected member, or needs-remediation for a
      # verdict carrying a real defect). output-equals reads elect-lander's
      # Outputs["elected"] directly, the same shape merge-gate's land-outcome uses.
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: elected
          equals: "true"
      branches:
        pass: merge-pr
        fail: apply-verdict

    - name: merge-gate
      # Issue #758: distinguishes an actual GitHub merge from a
      # merge-queue-enqueue — a plain output-equals(merged==true) can only
      # ever say "landed or not", which would silently conflate "enqueued,
      # not yet merged" with the refusal case. "land-outcome" reads
      # merge-pr's Outputs["landOutcome"] directly (internal/gate's
      # DefaultChecks doc).
      evaluator: automated
      automated:
        check: land-outcome
      branches:
        merged: post-merge
        enqueued: queue-watch
        # A conjunct that changed after review, or (now) a landOutcome the
        # merge queue itself hasn't resolved into "merged" yet, leaves the
        # PR unlabeled. Once CI/draft state recovers, pr-select can review
        # and retry it.
        fail: ""

    - name: queue-gate
      # Issue #758: the merge queue's own eventual verdict on an already-
      # enqueued PR — merged (proceed to the same post-merge fan-out a
      # direct merge gets), evicted (an explicit, first-class outcome —
      # queue-watch has already labeled the PR goobers:needs-remediation by
      # the time this gate evaluates, so no further routing happens here),
      # or timeout (still pending past queue-watch's own bounded poll; a
      # conjunct that changed after review leaves the PR as-is, same as
      # merge-gate's fail branch, for a later run to reconsider).
      evaluator: automated
      automated:
        check: queue-outcome
      branches:
        merged: post-merge
        evicted: ""
        timeout: ""
        fail: ""
