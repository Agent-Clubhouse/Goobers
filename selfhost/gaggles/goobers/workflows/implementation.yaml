# INTENTIONAL LIVE DIVERGENCE:
# The checked-in reference keeps two runs/day, maxConcurrentRuns=1,
# maxRunsPerHour=1, and maxOpenPRs=1. Operator-tuned live cadence and budget
# changes are deliberately not mirrored here.
apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: implementation
spec:
  gaggle: goobers
  displayName: Implementation (issue -> PR, reviewer gate, CI-poll repass)
  # The flagship V0 workflow (ARCHITECTURE.md §12, issue #27): claim a
  # goobers:ready issue, implement it in a worktree, pass it through a
  # reviewer gate and a local `make ci`-style gate, open a PR, then poll CI
  # with a bounded repass loop back to implementation on failure. When this
  # closes, the core loop exists: feed issues in, PRs come out.
  #
  # DOGFOOD GUARDRAIL: fires twice daily (08:17/20:17 local) with
  # maxRunsPerHour 1 — cadence x hourly-cap together give a hard ceiling of
  # exactly 2 runs/day. (A native maxRunsPerDay field exists now, #340 — kept
  # to this cadence x hourly-cap combination here since it already expresses
  # the intended ceiling and this dogfood instance's own explicit low values
  # are deliberate, not something to migrate just because a more direct knob
  # exists.) This workflow never merges directly; the separate merge-review
  # workflow owns the explicitly opted-in, branch-protected merge path.
  triggers:
    - type: schedule
      schedule: "17 8,20 * * *"
  readiness:
    # Claiming (SEC-047 + claim ledger, WF-031) already guarantees two runs
    # never double-process the same issue; maxConcurrentRuns=1 here is the
    # deliberate low starting throughput this dogfood instance runs at, not a
    # safety floor — raise only with a maintainer's explicit sign-off.
    maxConcurrentRuns: 1
    maxRunsPerHour: 1
    # Open-PR cap (#353): don't dispatch a new run while this workflow already
    # has an un-merged goobers/implementation/* PR open. Looped runs branch
    # every PR off origin/main, so once several unmerged siblings touch
    # overlapping files they become mutually un-mergeable as a set (the V0.3
    # ladder hit this). Capping at 1 keeps the loop merge-paced and the open set
    # integrable; raise it once V0.5's auto-merge drains PRs without a human.
    # The runner does NOT rebase/resolve cross-PR conflicts here — that's V0.5's
    # merge-review/pr-remediation layer (epic #357).
    maxOpenPRs: 1
  start: query-backlog
  tasks:
    # Built-in backlog-query stage kind (WF-055/SCH-041): claims exactly one
    # item carrying both the trust label (SEC-047) and the curator's
    # goobers:ready output marker (#25). Narrowed to a single item (unlike
    # curation's batch) because each run of this workflow produces one PR.
    - name: query-backlog
      type: deterministic
      goal: Claim one ready, trust-approved issue to implement.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers:approved"
        requireLabels: "goobers:ready"
        # Issue #361/#355: close-out now sets status=in-review at PR-open
        # time instead of closing the issue outright, so an issue with a PR
        # still cycling through merge-review stays open (not closed) and
        # would otherwise remain eligible here. The durable GitHub label
        # (not the claim ledger, whose lease is sized for one run, not a
        # multi-day review cycle) is what excludes it from re-claim.
        excludeLabels: "goobers/status:in-review"
        maxItems: "1"
        # Lifts the claimed item into a journal artifact (executor.go's
        # InputResultFile convention) — the "implement" goober reads it as
        # context via its ContextPointers, not via Task.Inputs/InputsFrom.
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
        # Read-only in practice here (issue #414's open-PR eligibility
        # backstop: list open goober-authored PRs to exclude any candidate
        # issue that already has one, a defense-in-depth check on top of
        # excludeLabels above) — no dedicated read-only PR capability exists
        # yet, so this reuses github:pr:write the same way #361's post-merge
        # stage does for its own PR reads.
        - github:pr:write
      expectedOutputs:
        - claimed-item
      next: implement

    # Agentic implementation in a fresh, isolated worktree (§16/#19). Scoped
    # to repo:push only — this stage never talks to the issues or PR API.
    # Every repass (from the review or ci-gate below) re-enters here, so the
    # instructions cover reading prior-attempt context, not just a cold
    # start.
    - name: implement
      type: agentic
      goober: implementer
      goal: >-
        Implement the claimed issue end to end: read the issue and its
        acceptance criteria, plan, implement, verify with fast, targeted
        tests for what you changed, and commit to the run's branch (push is a
        separate deterministic stage — see push-branch below). Do NOT run the
        full `make ci` / `go test -race ./...` suite in-session — the
        deterministic local-ci stage below owns that authoritatively; running
        it here only burns the session's wall-clock budget on test execution
        that is about to run again anyway (#724). On a repass, first read the
        reviewer rationale or CI failure evidence attached as context and
        address it before making further changes.
      capabilities:
        - repo:push
        - agent:model
      retry:
        maxAttempts: 2
        backoffSeconds: 15
      # #724: bound the implement session's timeout to agent think-time, not
      # test wall-clock. The full `-race` suite grows with the repo (700+
      # merged PRs) and could consume the whole 30-min session, discarding
      # real in-progress work on the timeout. onTimeout=salvage is the
      # complement to the goal change above: if the session still times out
      # with a viable committed diff on the branch, the runner completes this
      # stage with that diff and advances to review + local-ci instead of
      # discarding the run.
      onTimeout: salvage
      # No model-reported artifacts (#301): the implementer's deliverable is its
      # committed diff on the run branch, which the runner captures and digests
      # as the reviewer's evidence. A model cannot correctly self-report digested
      # ArtifactPointers, so the result is status + scalar summary only.
      next: review

    # `make ci`-equivalent, run in the same worktree the implementer used.
    - name: local-ci
      type: deterministic
      goal: Run the project's local CI-equivalent (build, lint, tests) in the worktree.
      run:
        command: ["make", "ci"]
      inputs:
        # Serialize this stage instance-wide (executor flock, InputSerializeGroup):
        # `make ci` runs `go test -race ./...`, and two of those at once on one
        # machine saturate disk I/O so badly a test's own t.TempDir teardown
        # (os.RemoveAll → unlinkat) stalls in uninterruptible kernel I/O past the
        # 10-minute stage timeout — the suite hangs after cmd/goober-runtime,
        # cmd/goobers never finishes, and the run opens zero PRs (the #811/#812
        # hang, whose real cause is the Go test framework's temp-dir removal, not
        # git fsync or :8080). Every other stage stays parallel, so raising
        # maxConcurrentRuns above for throughput no longer reintroduces the hang.
        serializeGroup: "local-ci"
      retry:
        maxAttempts: 1
      next: local-gate

    # Deterministic branch push (#237): the implementer commits but never
    # pushes (no configured auth/identity for an agentic session to do so
    # reliably) — this stage publishes the run branch to origin through the
    # credential seam (#14), authenticated per-invocation, never persisted to
    # disk. Runs after local-ci passes so a broken build is never published.
    - name: push-branch
      type: deterministic
      goal: Push the run's branch to origin.
      run:
        command: ["goobers", "push-branch"]
      capabilities:
        - repo:push
      next: open-pr

    - name: open-pr
      type: deterministic
      goal: Open (or update, on repass) the PR for the run's branch.
      run:
        command: ["goobers", "open-pr"]
      inputs:
        # BranchName() = goobers/<workflow>/<run-id> (providers.BranchName,
        # #13) is stable across repasses, so a second call here updates the
        # existing PR rather than opening a duplicate.
        runIdFooter: "true"
        # Lifts prNumber/pull-request-url into ResultEnvelope.Outputs (not
        # just an artifact) so ci-poll's inputsFrom below can reference them
        # (executor.go's InputResultFile doc: a flat JSON result file also
        # merges into Outputs).
        resultFile: "pr-result.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - pull-request-url
        # Well-known handoff key for ci-poll's inputsFrom below.
        - prNumber
      next: ci-poll

    - name: ci-poll
      type: deterministic
      goal: Poll the PR's CI checks and review state until they conclude.
      run:
        # internal/executor.TaskExecutor (#18, #132) dispatches this built-in
        # stage kind via inputs.kind — it never shells out `command` for
        # kind=ci-poll (CIPollExecutor calls the PR provider directly).
        # `command` stays a placeholder because DeterministicRun.Command is a
        # required field in schema v0.
        command: ["goobers", "ci-poll"]
      inputs:
        kind: "ci-poll"
        # prOwner/prRepo default from RepoRef when unset (they match here).
      inputsFrom:
        # prNumber arrives via open-pr's declared Outputs, threaded by the
        # runner per this explicit mapping (Task.InputsFrom, #132) — not a
        # static value, and not blanket-propagated the way a gate's Inputs
        # flatten every upstream Output automatically.
        prNumber: prNumber
      capabilities:
        - github:pr:write
      expectedOutputs:
        - ciStatus
      next: ci-gate

    - name: close-out
      type: deterministic
      goal: >-
        Comment on the originating issue linking the open PR and mark it
        in-review — issue #361/#355: the work isn't done until the PR
        merges, so this no longer closes the issue outright. The actual
        close happens at the merge event (`goobers post-merge`, run by the
        separate opt-in merge-review workflow after its verdict + CI +
        SHA-pin conjuncts all hold, issue #360).
      run:
        command: ["goobers", "issue-close-out"]
      inputs:
        status: "in-review"
      capabilities:
        - github:issues:write
      # Terminal: no `next`. The core loop's product — issue in, PR out — is
      # complete once the issue carries the closing breadcrumb. There is no
      # merge stage anywhere in this workflow: merge-review owns that
      # separate, explicitly capability-gated path.

  gates:
    # Agentic gate: the reviewer invocation IS the evaluator (gate.md's
    # "Agentic" evaluator kind) — there is no separate preceding review task.
    # Before invoking the reviewer, the runner computes a deterministic diff of
    # the run branch (git diff base...HEAD), digests it, and attaches it as an
    # evidence context pointer (#301) — the reviewer judges the actual committed
    # change, runner-produced, never a model-self-reported artifact
    # (internal/gate.ReviewerInvocation, #20). Verdict decisions map directly
    # to branches (GT-002: never a silent pass): "needs-changes" repasses to
    # implement with the rationale as evidence; "fail" aborts outright
    # rather than spending repass budget on a fundamentally rejected
    # approach. Bounded repass + auto-escalation on budget exhaustion is
    # enforced by the gate evaluator at runtime (internal/gate,
    # DefaultMaxRepasses=3), not by this definition — past budget the
    # runtime overrides straight to @escalate regardless of these branches.
    # DOGFOOD GUARDRAIL: this gate is ON by design — every implementation run
    # gets an independent reviewer verdict before a PR can reach CI-poll.
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        pass: local-ci
        needs-changes: implement
        fail: "@abort"

    # local-ci's ResultEnvelope.Status is flattened into this gate's
    # Inputs[status] by the runner (internal/gate's documented
    # runner-contract convention); "success" is status-equals' default
    # expected value, so no params are needed.
    - name: local-gate
      evaluator: automated
      automated:
        check: status-equals
      branches:
        pass: push-branch
        fail: implement

    # ci-poll sets Outputs[ciStatus] to the normalized providers.CheckState
    # value ("passing"/"failing"/"pending" — providers/model.go); the
    # ci-status check reads that well-known key.
    - name: ci-gate
      evaluator: automated
      automated:
        check: ci-status
        params:
          equals: "passing"
      branches:
        pass: close-out
        # A CI failure repasses to implement with the failure evidence
        # (checks/failure detail) attached as context by the runner, the
        # same evidence-pointer mechanism the reviewer gate uses.
        fail: implement
        # A poll timeout (#239) is not evidence CI failed — just that it
        # didn't finish in time — so it escalates for a human decision
        # instead of spending an agentic repass re-implementing a change
        # that was never actually reviewed as failing.
        timeout: "@escalate"
