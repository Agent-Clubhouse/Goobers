apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: backlog-curation
spec:
  gaggle: goobers
  displayName: Backlog curation
  # Producer/consumer hybrid (ARCHITECTURE.md §7, §12; WF-055, SCH-041): a cron
  # trigger wakes this workflow; its own first stage queries + claims eligible
  # items rather than being routed to by the scheduler's backlog-item trigger.
  # 3x/day, spread across the day (03:22/11:22/19:22 local) — readiness adds a
  # hard per-hour ceiling as a runaway guard (WorkflowSpec has no native
  # per-day budget field, so cadence + hourly cap together express it).
  triggers:
    - type: schedule
      schedule: "22 3,11,19 * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 1
  start: query-backlog
  tasks:
    # Built-in backlog-query stage kind (ARCHITECTURE.md §7, WF-055): queries
    # the issues provider and claims candidates, honoring the untrusted-input
    # eligibility gate (SEC-047) — only items carrying the maintainer-applied
    # trust label are claimable. This is a public repo: goobers:approved is a
    # hard gate, not a default to relax. Re-running is a no-op because the
    # query only ever returns items still missing both output markers
    # (idempotency).
    - name: query-backlog
      type: deterministic
      goal: Query the backlog for trust-labeled, uncurated items and claim them.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        # Eligibility: only items a maintainer has explicitly approved
        # (SEC-047). Backlog item text is untrusted data, never instructions —
        # this label is the provider-permission-enforced gate on that
        # untrusted input.
        trustLabel: "goobers:approved"
        # Idempotency: items already bearing either output marker are
        # excluded, so a re-run over an already-curated backlog claims
        # nothing.
        excludeLabels: "goobers:ready,goobers:needs-human"
        # Batch: claim up to 20 eligible items in one run (#236). backlog-query
        # now honors maxItems (it was a dead input) and, for a batch, writes a
        # claimed-items.json array.
        maxItems: "20"
        # Serves two purposes, both requiring the file be declared:
        # (#236) lifts the claimed-items array into a journal artifact so it
        # reaches the curator as a context pointer — without this input the file
        # was written into the stage worktree and destroyed with it, so the
        # curator received no list of what it owned; and (#233) lets shell.go
        # read the file back to report ResultNoWork on an empty/fully-contested
        # tick, so the runner can tell "genuinely nothing to do" from "claimed
        # something" rather than relying on the exit code alone. Plural name:
        # curation claims a batch (maxItems>1 → JSON array).
        resultFile: "claimed-items.json"
      capabilities:
        - github:issues:write
      expectedOutputs:
        - claimed-items
      next: curate
    # Agentic curation: dedupe, prune stale, tag, and split oversized items.
    # Issues-only — the curator goober is granted no repo capability (issue
    # #25 scope: "touching issues only, never code").
    - name: curate
      type: agentic
      goober: curator
      goal: >-
        Curate the claimed backlog items: dedupe, handle staleness, tag, split
        oversized items, and mark each item goobers:ready or
        goobers:needs-human. Explain every action in a comment on the item.
      capabilities:
        - github:issues:write
        - agent:model
      expectedOutputs:
        - curation-summary
      next: release-claim
    # Explicit release (issue #234): curation touches issues only — there is
    # no CI-poll or reviewer loop, and it never opens a PR or closes the
    # issue (ARCHITECTURE.md §12 lists reviewer gates as an
    # *implementation*-workflow concern, not curation's) — so
    # issue-close-out's release (implementation-only) never runs for it.
    # Without this stage a curation run's claim sat held for the full lease
    # (up to 6h, #235) even though curation's own work on the item finished
    # immediately, locking implementation out of exactly the item curation
    # just readied (#234). No capabilities: a pure ledger operation, no
    # provider/credential access needed.
    - name: release-claim
      type: deterministic
      goal: Release this run's claim ledger lease now that curation is done.
      run:
        command: ["goobers", "backlog-query", "--release"]
      # Terminal: no `next`.
