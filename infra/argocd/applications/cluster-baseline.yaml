# Cluster baseline: system namespace + baseline network policies (SEC-001, SEC-Q5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-baseline
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/goobers/infra.git
    targetRevision: main
    path: infra/cluster
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
