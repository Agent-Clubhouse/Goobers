# Goobers control-plane CI — Go build/vet/test/lint gate.
# Owned by the Go skeleton mission (Dev-3). QA's /test e2e harness layers on top
# of this as a separate stage/pipeline.
#
# Runs on every PR to main and on main itself.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  GO_VERSION: '1.23'
  GOLANGCI_LINT_VERSION: 'v2.12.2'

steps:
  - task: GoTool@0
    displayName: 'Install Go $(GO_VERSION)'
    inputs:
      version: '$(GO_VERSION)'

  - script: go mod download
    displayName: 'Download modules'

  - script: make fmt-check
    displayName: 'gofmt check'

  - script: make vet
    displayName: 'go vet'

  - script: make build
    displayName: 'Build binaries'

  - script: make test
    displayName: 'Unit tests (race + coverage)'

  - script: |
      curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
        | sh -s -- -b $(go env GOPATH)/bin $(GOLANGCI_LINT_VERSION)
      $(go env GOPATH)/bin/golangci-lint run
    displayName: 'golangci-lint'

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish coverage'
    condition: succeededOrFailed()
    inputs:
      summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.out'
