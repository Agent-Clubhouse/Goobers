name: CI

# Goobers control-plane and portal CI — the enforced merge gate.
# Runs dead-code analysis plus the portable Go CI entrypoint (Go
# fmt/vet/build/test/lint + portal build/test) on Ubuntu and macOS on every PR
# to main, push to main, and merge-group build. See CONTRIBUTING.md's validation
# tier contract, the Makefile's deadcode target, and test/ci for the
# authoritative full-gate step list.
#
# Windows is gated too, as a required compile smoke (go build + go vet for
# windows/amd64) — not the full suite yet (#633; full `make ci` on Windows is
# gated on #630). The platform legs, the vulnerability scan, and the dedicated
# journal-conformance job must all be green for the required `make ci` check to
# pass; see the conformance, windows-smoke, vulnerability-scan, and required-ci
# jobs below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

# Least privilege: CI only needs to read the checkout.
permissions:
  actions: read
  contents: read

# One in-flight run per ref; newer pushes cancel stale runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin lint to the version the Makefile/ADO pipeline targeted (schema v2 config).
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  ci:
    name: platform gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # The DSL compatibility test executes the registry from the latest
          # reachable SemVer tag, so shallow history would erase its baseline.
          fetch-depth: 0

      # Track the toolchain declared in go.mod (currently go 1.26.5) rather than a
      # hardcoded version, so CI can't drift from the module's `go` directive.
      # setup-go scopes its module/build cache key by runner OS and architecture.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Download modules
        run: go mod download

      - name: Install golangci-lint ${{ env.GOLANGCI_LINT_VERSION }}
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Find previous main timing run
        id: previous-timing
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const {data} = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ci.yml",
              branch: "main",
              status: "success",
              per_page: 20,
            });
            const previous = data.workflow_runs.find(
              run => run.id !== context.runId,
            );
            return previous ? String(previous.id) : "";
          result-encoding: string

      - name: Download previous timing artifact
        if: ${{ steps.previous-timing.outputs.result != '' }}
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: test-timings-${{ runner.os }}
          path: previous-test-timings
          run-id: ${{ steps.previous-timing.outputs.result }}
          github-token: ${{ github.token }}

      - name: Dead-code analysis
        run: make deadcode

      # Portable implementation of the documented `make ci` merge tier. The
      # Make target composes the deadcode target above with this entrypoint.

      - name: Portable CI
        env:
          GOOBERS_TEST_TIMING_FILE: test-timings/unit-${{ runner.os }}.json
        run: go run ./test/ci

      - name: Report test timing budget
        if: ${{ !cancelled() && hashFiles(format('test-timings/unit-{0}.json', runner.os)) != '' }}
        run: >-
          go run ./test/testtiming report
          -budget .github/test-timing-budgets.json
          -current test-timings/unit-${{ runner.os }}.json
          -previous previous-test-timings/unit-${{ runner.os }}.json

      - name: Upload test timing
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-timings-${{ runner.os }}
          path: test-timings/unit-${{ runner.os }}.json
          if-no-files-found: warn

      # Parity with the ADO pipeline's coverage publish (informational; the
      # coverage *gate* is `make cover-check`, part of `verify-full` but
      # intentionally separate from the merge-tier `ci` target).
      - name: Upload coverage profile
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ runner.os }}
          path: coverage.out
          if-no-files-found: ignore

  integration:
    name: declared-dependency integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      # Keep this list aligned with the inventory printed by
      # `make test-integration`. Strict mode makes an absent executable red.
      - name: Provision declared dependencies (bash, bwrap, dirname, head, mkdir, sh, sleep, yes)
        run: |
          sudo apt-get update
          sudo apt-get install --yes bash bubblewrap coreutils dash
          # Ubuntu 24.04 restricts the user namespace needed by bubblewrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Run strict integration tier
        run: make test-integration-strict

  conformance:
    name: journal conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Enforce the journal conformance contract
        run: make test-conformance

  # Windows joins CI as a REQUIRED, GREEN compile smoke (#633) — deliberately not
  # the old advisory `continue-on-error` `windows-smoke` job (#928) that #960 had
  # to remove: that one published a red check the Goobers merge flow (which has no
  # notion of an advisory check, see #961) read as a hard block. This one is
  # different in kind — it actually passes. It cross-checks that the whole tree
  # BUILDS and VETS for Windows (native windows/amd64 on a real runner), which is
  # green as of #623's proc Job-Object impl + the build-tags on the unix-only
  # commands/tests. That makes it safe to gate on: it only reds on a real,
  # fixable Windows compile break — the drift #1091 exists to stop — never as an
  # expected-red. It is compile-only (build + vet, no tests): upgrading it to the
  # full `make ci` (running the suite on Windows) is gated on #630 and tracked in
  # #633's definition of done.
  windows-smoke:
    name: windows compile smoke (go build · go vet)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Platform-scoped Go cache (setup-go keys by runner OS/arch), so the
      # windows leg neither shares nor evicts the ubuntu/macos caches.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      # Compiles every package for windows/amd64, including the //go:build windows
      # files (internal/platform/proc, lock, winsvc, safeopen) that no other gate
      # exercises. `go build ./...` skips _test.go files; `go vet ./...` compiles
      # them too, so a windows-incompatible test also gets caught.
      - name: go build (windows/amd64)
        run: go build ./...

      - name: go vet (windows/amd64)
        run: go vet ./...

  shipped-workflows:
    name: shipped workflow contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Exercise shipped workflows through the local runner
        run: make test-shipped-workflows

  vulnerability-scan:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Scan reachable Go code
        run: make vulncheck

  required-ci:
    name: make ci (deadcode · fmt-check · vet · build · test · lint)
    if: ${{ always() }}
    needs: [ci, windows-smoke, shipped-workflows, vulnerability-scan, conformance]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required gates
        env:
          MATRIX_RESULT: ${{ needs.ci.result }}
          VULNCHECK_RESULT: ${{ needs.vulnerability-scan.result }}
          WINDOWS_RESULT: ${{ needs.windows-smoke.result }}
          SHIPPED_WORKFLOWS_RESULT: ${{ needs.shipped-workflows.result }}
          CONFORMANCE_RESULT: ${{ needs.conformance.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "A required platform gate (ubuntu/macos make ci) did not pass."
            exit 1
          fi
          if [ "$WINDOWS_RESULT" != "success" ]; then
            echo "The windows compile smoke (go build + go vet) did not pass."
            exit 1
          fi
          if [ "$SHIPPED_WORKFLOWS_RESULT" != "success" ]; then
            echo "The shipped workflow contract suite did not pass."
            exit 1
          fi
          if [ "$VULNCHECK_RESULT" != "success" ]; then
            echo "The Go vulnerability scan did not pass."
            exit 1
          fi
          if [ "$CONFORMANCE_RESULT" != "success" ]; then
            echo "The journal conformance gate did not pass."
            exit 1
          fi

  sandbox:
    name: sandbox confinement (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bubblewrap
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install --yes bubblewrap
          # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user
          # namespaces via AppArmor, which bubblewrap needs to set up its
          # uid map. Relax it so the confinement probe can create the
          # sandbox namespace on the hosted runner. Tolerate the knob being
          # absent (future runner images / kernels): the confinement test
          # itself, run with GOOBERS_REQUIRE_SANDBOX_TEST=1, remains the
          # authoritative gate.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Exercise native sandbox
        run: make sandbox-check

  # Linux node validation (#636): prove the shipped binary end to end on Linux —
  # an offline demo run to completion plus the full daemon start/status/stop
  # lifecycle under a real SIGTERM — and cross-compile the Windows supervision
  # handler (#639). Deterministic and offline, so it is a reliable required gate.
  linux-validation:
    name: linux node validation (#636/#639)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Reproduce this full-tier platform gate locally with the same target.
      - name: Validate Linux node and Windows platform seams
        run: make linux-node-validation

      - name: Upload Linux validation evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: linux-validation-evidence
          path: bin/linux-validation-evidence/
          if-no-files-found: warn
