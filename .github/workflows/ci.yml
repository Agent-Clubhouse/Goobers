name: CI

# Goobers control-plane CI — the enforced merge gate.
# Runs `make ci` (fmt-check · vet · build · test · lint) on Ubuntu and macOS,
# plus an advisory Windows compile smoke, on every PR to main, push to main, and
# merge-group build. See Makefile `ci` target for the authoritative full-gate
# step list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

# Least privilege: CI only needs to read the checkout.
permissions:
  contents: read

# One in-flight run per ref; newer pushes cancel stale runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin lint to the version the Makefile/ADO pipeline targeted (schema v2 config).
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  ci:
    name: platform gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            allow-failure: false
          - os: macos-latest
            allow-failure: false
          - os: windows-latest
            allow-failure: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow-failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Track the toolchain declared in go.mod (currently go 1.26) rather than a
      # hardcoded version, so CI can't drift from the module's `go` directive.
      # setup-go scopes its module/build cache key by runner OS and architecture.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install golangci-lint ${{ env.GOLANGCI_LINT_VERSION }}
        if: runner.os != 'Windows'
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Single faithful reproduction of the local gate. This is exactly what QA
      # reruns on PR heads, so the CI check and the local `make ci` never diverge.
      - name: make ci
        if: runner.os != 'Windows'
        run: make ci

      # Windows remains advisory until the platform abstractions and portable
      # toolchain tracked by #620, #623, #625, #627, and #630 have landed.
      - name: Windows vet smoke
        if: runner.os == 'Windows'
        run: go vet ./...

      - name: Windows build smoke
        if: runner.os == 'Windows'
        run: go build ./...

      # Parity with the ADO pipeline's coverage publish (informational; the
      # coverage *gate* is `make cover-check`, intentionally separate from `ci`).
      - name: Upload coverage profile
        if: ${{ !cancelled() && runner.os != 'Windows' }}
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ runner.os }}
          path: coverage.out
          if-no-files-found: ignore

  required-ci:
    name: make ci (fmt-check · vet · build · test · lint)
    if: ${{ always() }}
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Verify required platform gates
        env:
          MATRIX_RESULT: ${{ needs.ci.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "A required platform gate did not pass."
            exit 1
          fi

  sandbox:
    name: sandbox confinement (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bubblewrap
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install --yes bubblewrap
          # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user
          # namespaces via AppArmor, which bubblewrap needs to set up its
          # uid map. Relax it so the confinement probe can create the
          # sandbox namespace on the hosted runner. Tolerate the knob being
          # absent (future runner images / kernels): the confinement test
          # itself, run with GOOBERS_REQUIRE_SANDBOX_TEST=1, remains the
          # authoritative gate.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Exercise native sandbox
        env:
          GOOBERS_REQUIRE_SANDBOX_TEST: "1"
        run: go test -race ./internal/sandbox
