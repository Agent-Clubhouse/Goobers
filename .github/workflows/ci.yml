name: CI

# Goobers control-plane and portal CI — the enforced merge gate.
# Runs the portable Go CI entrypoint (Go fmt/vet/build/test/lint + portal
# build/test) on Ubuntu and macOS on every PR to main, push to main, and
# merge-group build. See test/ci for the authoritative full-gate step list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

# Least privilege: CI only needs to read the checkout.
permissions:
  contents: read

# One in-flight run per ref; newer pushes cancel stale runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin lint to the version the Makefile/ADO pipeline targeted (schema v2 config).
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  ci:
    name: platform gate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Track the toolchain declared in go.mod (currently go 1.26) rather than a
      # hardcoded version, so CI can't drift from the module's `go` directive.
      # setup-go scopes its module/build cache key by runner OS and architecture.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Download modules
        run: go mod download

      - name: Install golangci-lint ${{ env.GOLANGCI_LINT_VERSION }}
        run: |
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${GOLANGCI_LINT_VERSION}/install.sh" \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Single faithful reproduction of the local gate. `make ci` delegates to
      # this command on Unix without introducing a second implementation.
      - name: Portable CI
        run: go run ./test/ci

      # Parity with the ADO pipeline's coverage publish (informational; the
      # coverage *gate* is `make cover-check`, intentionally separate from `ci`).
      - name: Upload coverage profile
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: coverage-${{ runner.os }}
          path: coverage.out
          if-no-files-found: ignore

  # NOTE: an advisory `windows-smoke` job lived here. It was `continue-on-error`
  # and deliberately excluded from `required-ci`, so it never gated merges from
  # GitHub's point of view — but it still published a red check status on every
  # PR, and the Goobers merge flow has no notion of an advisory check, so it
  # read that red as a hard block. Removed until Windows can actually pass
  # the portable CI entrypoint (#620, #623, #625, #627, #630), at which point it joins the `ci`
  # matrix as a required leg (#633). Do not reintroduce it as an expected-red
  # advisory job while the merge flow still treats every check as gating.

  required-ci:
    name: make ci (fmt-check · vet · build · test · lint)
    if: ${{ always() }}
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Verify required platform gates
        env:
          MATRIX_RESULT: ${{ needs.ci.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "A required platform gate did not pass."
            exit 1
          fi

  sandbox:
    name: sandbox confinement (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bubblewrap
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install --yes bubblewrap
          # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user
          # namespaces via AppArmor, which bubblewrap needs to set up its
          # uid map. Relax it so the confinement probe can create the
          # sandbox namespace on the hosted runner. Tolerate the knob being
          # absent (future runner images / kernels): the confinement test
          # itself, run with GOOBERS_REQUIRE_SANDBOX_TEST=1, remains the
          # authoritative gate.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Exercise native sandbox
        env:
          GOOBERS_REQUIRE_SANDBOX_TEST: "1"
        run: go test -race ./internal/sandbox

  # Linux node validation (#636): prove the shipped binary end to end on Linux —
  # an offline demo run to completion plus the full daemon start/status/stop
  # lifecycle under a real SIGTERM — and cross-compile the Windows supervision
  # handler (#639). Deterministic and offline, so it is a reliable required gate.
  linux-validation:
    name: linux node validation (#636/#639)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build goobers
        run: go build -o bin/goobers ./cmd/goobers

      - name: Validate daemon lifecycle + offline demo run on Linux
        run: go run ./test/linuxvalidate -bin bin/goobers -out linux-validation-evidence

      # Lock the #639 supervision handler's compile guarantee: the Windows
      # Service wrapper must build/vet under GOOS=windows even though the full
      # tree cannot cross-compile until the POSIX abstractions (#620-627) land.
      # internal/winsvc is self-contained precisely so this stays green today.
      - name: Cross-compile Windows supervision handler
        run: |
          GOOS=windows go build ./internal/winsvc/...
          GOOS=windows go vet ./internal/winsvc/...

      # Lock the #1090 compile guarantee: the symlink-safe open seam and its
      # only consumer must build/vet under GOOS=windows even though the full
      # tree cannot cross-compile until the remaining POSIX abstractions land.
      # The windows no-follow impl (CreateFile + FILE_FLAG_OPEN_REPARSE_POINT)
      # is compile-only until the Windows CI job exercises it at runtime.
      - name: Cross-compile Windows symlink-safe asset open (#1090)
        run: |
          GOOS=windows go build ./internal/platform/safeopen/... ./internal/gooberassets/...
          GOOS=windows go vet ./internal/platform/safeopen/... ./internal/gooberassets/...

      - name: Upload Linux validation evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: linux-validation-evidence
          path: linux-validation-evidence/
          if-no-files-found: warn
