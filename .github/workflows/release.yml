name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve feature baseline
        id: feature-baseline
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          previous_tag=""
          release_commit="$(git rev-list --parents -n 1 "$TAG")"
          if [[ "$release_commit" == *" "* ]]; then
            previous_tag="$(
              git tag --merged "$TAG^" --sort=-version:refname --list "v*" |
                grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' |
                head -n 1 || true
            )"
          fi

          if [[ -z "$previous_tag" ]]; then
            echo "first=true" >> "$GITHUB_OUTPUT"
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            mkdir -p .release-baseline
            gh release download "$previous_tag" \
              --pattern feature-registry.json \
              --pattern dsl-support-matrix.json \
              --dir .release-baseline
            test -s .release-baseline/feature-registry.json
            test -s .release-baseline/dsl-support-matrix.json
            echo "first=false" >> "$GITHUB_OUTPUT"
            echo "path=.release-baseline/feature-registry.json" >> "$GITHUB_OUTPUT"
            echo "support-path=.release-baseline/dsl-support-matrix.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release artifacts
        env:
          COMMIT_SHA: ${{ github.sha }}
          FIRST_FEATURE_SNAPSHOT: ${{ steps.feature-baseline.outputs.first }}
          PREVIOUS_FEATURES: ${{ steps.feature-baseline.outputs.path }}
          PREVIOUS_SUPPORT_MATRIX: ${{ steps.feature-baseline.outputs.support-path }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$FIRST_FEATURE_SNAPSHOT" == "true" ]]; then
            baseline=(-first-feature-snapshot)
          else
            baseline=(
              -previous-features "$PREVIOUS_FEATURES"
              -previous-support-matrix "$PREVIOUS_SUPPORT_MATRIX"
            )
          fi
          commit="$(git rev-parse --short=12 "$COMMIT_SHA")"
          date="$(git show -s --format=%cI "$COMMIT_SHA")"
          go run ./release \
            -version "$TAG" \
            -commit "$commit" \
            -date "$date" \
            -output dist \
            "${baseline[@]}"

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          go run ./release/notes \
            -tag "$TAG" \
            -feature-notes dist/RELEASE_NOTES.md \
            -output dist/RELEASE_NOTES.md

      - name: Verify release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          (cd dist && sha256sum --check SHA256SUMS)
          grep --fixed-strings "## Changelog" dist/RELEASE_NOTES.md
          grep --fixed-strings "## DSL feature-support delta" dist/RELEASE_NOTES.md
          grep --fixed-strings "## DSL support-matrix delta" dist/RELEASE_NOTES.md
          grep --fixed-strings "## Support policy for external consumers" dist/RELEASE_NOTES.md
          test -x dist/install.sh
          sh -n dist/install.sh
          grep --fixed-strings "  install.sh" dist/SHA256SUMS
          mkdir smoke
          tar -xzf "dist/goobers_${TAG}_linux_amd64.tar.gz" -C smoke
          smoke/goobers --version | grep --fixed-strings "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file dist/RELEASE_NOTES.md
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --title "$TAG" \
              --notes-file dist/RELEASE_NOTES.md
          fi
