---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: gaggles.goobers.dev
spec:
  group: goobers.dev
  names:
    kind: Gaggle
    listKind: GaggleList
    plural: gaggles
    shortNames:
    - gag
    singular: gaggle
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.gooberCount
      name: Goobers
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Gaggle is a siloed workforce of goobers within an instance.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              GaggleSpec defines a siloed workforce within an instance. A gaggle targets one
              project codebase and exactly one backlog (singleton), and contains its own
              goobers and workflows (which reference it by name). Isolation is realized as a
              namespace + identity per gaggle (GAG-001..006, SEC-001/002).
            properties:
              additionalRepos:
                description: |-
                  AdditionalRepos are optional extra repos a less-standard gaggle may target;
                  the backlog and infra/config repos always remain singletons (GAG-007).
                items:
                  description: |-
                    RepoRef points at a git repository through a provider connection. Auth is a
                    SecretRef — never an inline token.
                  properties:
                    branch:
                      default: main
                      description: Branch is the default branch goober runs check
                        out and target.
                      type: string
                    connectionRef:
                      description: |-
                        ConnectionRef names the connection (and thus credentials) used to reach
                        this repo. It resolves to a Connection declared in the Manifest.
                      type: string
                    name:
                      description: Name of the repository.
                      type: string
                    owner:
                      description: Owner/organization (GitHub org/user, or ADO organization/project
                        owner).
                      type: string
                    provider:
                      description: |-
                        Provider identifies a backing system vendor. v1 abstracts repo + backlog over
                        both GitHub and Azure DevOps (ADO) from the start (see VISION §8 "v1 providers").
                      enum:
                      - github
                      - ado
                      type: string
                  required:
                  - name
                  - owner
                  - provider
                  type: object
                type: array
              backlog:
                description: Backlog is the singleton source of work-item truth for
                  this gaggle.
                properties:
                  connectionRef:
                    description: ConnectionRef names the connection (credentials)
                      used to reach the backlog.
                    type: string
                  labels:
                    description: |-
                      Query/labels narrow which items this gaggle considers work. Routing of an
                      item to a specific workflow is handled by workflow selectors (SCH-010).
                    items:
                      type: string
                    type: array
                  project:
                    description: Project scopes the backlog (GitHub repo "owner/name"
                      or ADO project).
                    type: string
                  provider:
                    description: |-
                      Provider identifies a backing system vendor. v1 abstracts repo + backlog over
                      both GitHub and Azure DevOps (ADO) from the start (see VISION §8 "v1 providers").
                    enum:
                    - github
                    - ado
                    type: string
                  query:
                    type: string
                required:
                - project
                - provider
                type: object
              branchNamespace:
                description: |-
                  BranchNamespace is the refs/heads/ root this gaggle's run branches live
                  under — providers.BranchName produces "<branchNamespace><workflow>/<run>".
                  Empty defaults to providers.DefaultBranchNamespace ("goobers/"). It is the
                  single value three consumers derive from so they cannot drift (#965/#1010):
                  the run branch the worktree pushes, the mirror-fetch exclusion that
                  preserves that branch across a run's stages, and the PR-selector headPrefix
                  defaults. Retuning it lets one instance host gaggles that keep their run
                  branches in distinct namespaces; a value with no trailing "/" is treated as
                  if it had one. Most gaggles omit it and share the default.
                type: string
              displayName:
                description: DisplayName is the human-facing name shown on the portal
                  dashboard.
                type: string
              isolation:
                description: Isolation declares the per-gaggle boundary (namespace
                  + workload identity).
                properties:
                  identityRef:
                    description: |-
                      IdentityRef names the per-gaggle Azure workload identity (managed-identity
                      federation) used to reach Key Vault, providers, and telemetry.
                    type: string
                  namespace:
                    description: |-
                      Namespace is the k8s namespace this gaggle's pods/secrets live in. Must be
                      unique per gaggle so credentials/work/telemetry do not leak across gaggles.
                    type: string
                required:
                - namespace
                type: object
              project:
                description: Project is the codebase this gaggle works on.
                properties:
                  branch:
                    default: main
                    description: Branch is the default branch goober runs check out
                      and target.
                    type: string
                  connectionRef:
                    description: |-
                      ConnectionRef names the connection (and thus credentials) used to reach
                      this repo. It resolves to a Connection declared in the Manifest.
                    type: string
                  name:
                    description: Name of the repository.
                    type: string
                  owner:
                    description: Owner/organization (GitHub org/user, or ADO organization/project
                      owner).
                    type: string
                  provider:
                    description: |-
                      Provider identifies a backing system vendor. v1 abstracts repo + backlog over
                      both GitHub and Azure DevOps (ADO) from the start (see VISION §8 "v1 providers").
                    enum:
                    - github
                    - ado
                    type: string
                required:
                - name
                - owner
                - provider
                type: object
            required:
            - backlog
            - isolation
            - project
            type: object
          status:
            description: |-
              GaggleStatus reports the observed state of a Gaggle. The operator (M9) writes
              it via the status subresource.
            properties:
              conditions:
                description: Conditions follow standard k8s conventions; "Ready" summarizes
                  reconcile.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              gooberCount:
                description: GooberCount is the number of Goobers currently bound
                  to this gaggle.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: 'Phase is a coarse lifecycle summary: Pending, Ready,
                  or Degraded.'
                type: string
              readyWorkers:
                description: ReadyWorkers is the number of worker Deployments fully
                  available.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
