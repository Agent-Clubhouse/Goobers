# Goobers CRDs, generated from api/v1alpha1 by controller-gen (`make manifests`).
# Apply with: kubectl apply -k config/crd
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - bases/goobers.dev_gaggles.yaml
  - bases/goobers.dev_goobers.yaml
  - bases/goobers.dev_workflows.yaml
  - bases/goobers.dev_manifests.yaml
