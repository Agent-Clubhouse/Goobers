apiVersion: goobers.dev/v1alpha1
kind: Manifest
metadata:
  name: example-instance
  # The pre-GA DSL is preview and must be acknowledged at instance scope.
  annotations:
    goobers.dev/allow-preview-features: "true"
spec:
  instance:
    name: example
    environment: dev
  # Named, reusable connections. Credentials are always references — never
  # inline tokens (CFG-009, SEC-010). At tiers 1-2, secretRef.name resolves
  # against a repo token declared in this instance's instance.yaml; leave
  # keyVault empty locally.
  connections:
    - name: repo-token
      type: repo
      provider: github
      secretRef:
        name: repo-token
  # Gaggles included in this instance's desired state. Each must have a Gaggle
  # object under gaggles/<name>/.
  gaggles:
    - example
