apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: default-implement
spec:
  gaggle: example
  displayName: Default (implement-only)
  # The default starter polls for maintainer-approved backlog work, claims one
  # item before the coder runs, and closes it out after successful implementation.
  # Author richer workflows (research, tests, reviewer gates) by adding tasks
  # and gates.
  triggers:
    - type: backlog-item
      selector:
        goobers: "true"
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim one approved backlog item to implement.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
        - github:pr:write
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: coder
      goal: Implement the backlog item and open a PR.
      capabilities:
        - repo:push
        - github:pr:write
      expectedOutputs:
        - pull-request
      next: close-out
    - name: close-out
      type: deterministic
      goal: Close the implemented backlog item and release its claim.
      run:
        command: ["goobers", "issue-close-out"]
      inputs:
        status: "done"
      capabilities:
        - github:issues:write
