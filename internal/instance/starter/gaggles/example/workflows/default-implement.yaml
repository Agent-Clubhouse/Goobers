apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: default-implement
spec:
  gaggle: example
  displayName: Default (implement-only)
  # The default starter is a minimal implement-only workflow shipped so a gaggle
  # works immediately (WF-004). The schedule wakes it every 15 minutes;
  # query-backlog claims one maintainer-approved item before the coder runs.
  # Author richer workflows (research, tests, reviewer gates) by adding tasks
  # and gates.
  triggers:
    - type: schedule
      schedule: "@every 15m"
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim one approved backlog item to implement.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: coder
      goal: Implement the backlog item and open a PR.
      expectedOutputs:
        - pull-request
      # No `next` — this is the single, terminal state of the workflow.
