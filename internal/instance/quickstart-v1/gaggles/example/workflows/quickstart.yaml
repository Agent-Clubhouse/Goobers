apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: quickstart
  annotations:
    goobers.dev/template: quickstart
    goobers.dev/template-version: "1"
dslVersion: "1.4"
spec:
  gaggle: example
  displayName: Quickstart v1 (onboarding - not for production)
  triggers:
    - type: manual
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim one maintainer-approved tutorial issue.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers:approved"
        requireLabels: "goobers:ready"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
        - github:pr:write
      policyActions:
        - claim-backlog-items
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: implementer
      goal: Implement the claimed tutorial issue, run targeted checks, and commit the change.
      capabilities:
        - repo:push
      policyActions:
        - modify-repository
      next: push-branch
    - name: push-branch
      type: deterministic
      goal: Push the tutorial run branch to origin.
      run:
        command: ["goobers", "push-branch"]
      capabilities:
        - repo:push
      policyActions:
        - push-repository-branch
      next: review
    - name: review
      type: agentic
      goober: reviewer
      goal: Perform one advisory code review of the published change.
      continueOnError: true
      next: open-pr
    - name: open-pr
      type: deterministic
      goal: Open a pull request for the tutorial run.
      run:
        command: ["goobers", "open-pr"]
      inputs:
        runIdFooter: "true"
        resultFile: "pr-result.json"
      capabilities:
        - github:pr:write
      policyActions:
        - open-or-update-pr
      expectedOutputs:
        - pull-request-url
        - prNumber
        - opened
      next: release-claim
    - name: release-claim
      type: deterministic
      goal: Clear the provider claim marker after opening the tutorial pull request.
      run:
        command: ["goobers", "backlog-query", "--release"]
      capabilities:
        - github:issues:write
      policyActions:
        - release-backlog-claim
