apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: quickstart
spec:
  gaggle: example
  displayName: Quickstart (onboarding only)
  triggers:
    - type: manual
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim the first approved tutorial issue.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers:approved"
        requireLabels: "goobers:ready"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
        - github:pr:write
      policyActions:
        - claim-backlog-items
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: implementer
      goal: Implement the claimed tutorial issue and commit the change.
      capabilities:
        - repo:push
      policyActions:
        - modify-repository
      next: review
    - name: review
      type: agentic
      goober: reviewer
      goal: Review the committed tutorial change and report focused feedback.
      next: push-branch
    - name: push-branch
      type: deterministic
      goal: Push the reviewed tutorial change.
      run:
        command: ["goobers", "push-branch"]
      capabilities:
        - repo:push
      policyActions:
        - push-repository-branch
      next: open-pr
    - name: open-pr
      type: deterministic
      goal: Open the tutorial pull request.
      run:
        command: ["goobers", "open-pr"]
      inputs:
        resultFile: "pr-result.json"
      capabilities:
        - github:pr:write
      policyActions:
        - open-or-update-pr
      expectedOutputs:
        - pull-request-url
        - prNumber
        - opened
