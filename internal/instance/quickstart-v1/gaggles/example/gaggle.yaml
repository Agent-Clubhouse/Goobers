apiVersion: goobers.dev/v1alpha1
kind: Gaggle
metadata:
  name: example
spec:
  displayName: Quickstart
  project:
    provider: github
    owner: your-org
    name: your-repo
    branch: main
    connectionRef: repo-token
  backlog:
    provider: github
    project: your-org/your-repo
    labels:
      - goobers:approved
      - goobers:ready
    connectionRef: repo-token
  isolation:
    namespace: gaggle-quickstart
