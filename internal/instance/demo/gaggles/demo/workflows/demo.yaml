apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: demo
spec:
  gaggle: demo
  displayName: Hermetic full-loop demo
  triggers:
    - type: schedule
      schedule: "@yearly"
  readiness:
    maxConcurrentRuns: 1
  start: curate
  tasks:
    - name: curate
      type: deterministic
      goal: Curate the bundled backlog item through the mock provider.
      inputs:
        resultFile: curate.json
      expectedOutputs:
        - provider
        - phase
        - itemID
        - itemTitle
      run:
        network: none
        workspace: scratch
        command:
          - goobers
          - __demo-provider
          - curate
      next: implement
    - name: implement
      type: deterministic
      goal: Implement the curated item without invoking a model.
      inputs:
        resultFile: implement.json
      inputsFrom:
        itemID: itemID
        itemTitle: itemTitle
      expectedOutputs:
        - provider
        - phase
        - itemID
        - pullNumber
        - pullRequestURL
        - headSHA
        - baseSHA
      run:
        network: none
        workspace: scratch
        command:
          - goobers
          - __demo-provider
          - implement
      next: review
    - name: review
      type: deterministic
      goal: Review the mock pull request with a deterministic fixture verdict.
      inputs:
        resultFile: review.json
      inputsFrom:
        itemID: itemID
        pullNumber: pullNumber
        pullRequestURL: pullRequestURL
        headSHA: headSHA
        baseSHA: baseSHA
      expectedOutputs:
        - provider
        - phase
        - itemID
        - pullNumber
        - pullRequestURL
        - headSHA
        - baseSHA
        - verdict
        - rationale
      run:
        network: none
        workspace: scratch
        command:
          - goobers
          - __demo-provider
          - review
      next: review-verdict
    - name: merge-preview
      type: deterministic
      goal: Preview the merge through the mock provider without writing remotely.
      inputs:
        resultFile: merge-preview.json
      inputsFrom:
        itemID: itemID
        pullNumber: pullNumber
        pullRequestURL: pullRequestURL
        headSHA: headSHA
        baseSHA: baseSHA
        verdict: verdict
      expectedOutputs:
        - provider
        - phase
        - pullRequestURL
        - mergeMethod
        - mergePreview
        - wouldMerge
      run:
        network: none
        workspace: scratch
        command:
          - goobers
          - __demo-provider
          - merge-preview
  gates:
    - name: review-verdict
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: verdict
          equals: pass
      branches:
        pass: merge-preview
        fail: "@abort"
