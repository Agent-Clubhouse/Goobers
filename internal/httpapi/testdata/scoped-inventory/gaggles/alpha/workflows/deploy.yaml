apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: deploy
spec:
  gaggle: alpha
  displayName: Alpha deploy
  triggers:
    - type: manual
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim the next deploy item.
      capabilities:
        - github:issues:write
      policyActions:
        - claim-backlog-items
      run:
        command: ["goobers", "backlog-query", "--claim"]
