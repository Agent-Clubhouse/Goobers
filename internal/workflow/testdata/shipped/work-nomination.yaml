apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: work-nomination
spec:
  gaggle: acme-web
  displayName: Work nomination
  # Producer workflow: on a schedule, gather telemetry/signals, then a nominator
  # files new backlog items (which the scheduler can route to other workflows).
  triggers:
    - type: schedule
      schedule: "0 6 * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 1
  start: gather-signals
  tasks:
    - name: gather-signals
      type: deterministic
      goal: Materialize threshold-crossing telemetry findings with journal evidence.
      run:
        command: ["goobers", "telemetry-query", "--window", "24h", "--aggregate", "stage-failure-rate", "--aggregate", "error-signature", "--aggregate", "gate-noise", "--format", "candidate-findings"]
      inputs:
        resultFile: "candidate-findings.json"
      capabilities:
        - telemetry:read
      expectedOutputs:
        - candidate-findings
      next: nominate
    - name: nominate
      type: agentic
      goober: nominator
      goal: Propose backlog items from the gathered signals and file them.
      capabilities:
        - telemetry:read
        - github:issues:write
      policyActions:
        - comment-on-issue
        - create-issue
        - label-issue
      # Terminal: no `next`.
