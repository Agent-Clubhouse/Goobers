apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: backlog-curation
spec:
  gaggle: acme-web
  displayName: Backlog curation
  # Producer/consumer hybrid: a cron trigger wakes the workflow; its first stage
  # queries + claims eligible backlog items (WF-055), then a curator triages,
  # labels, and de-dupes them.
  triggers:
    - type: schedule
      schedule: "@hourly"
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Query the provider for eligible items and claim them.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        # Declared so shell.go reads the file back and can report
        # ResultNoWork on an empty/fully-contested tick (issue #233) —
        # without this, an empty claim's exit-0 result carries no structured
        # signal beyond the exit code, and the runner has no way to tell
        # "genuinely nothing to do" from "claimed something."
        resultFile: "claimed-item.json"
      next: curate
    - name: curate
      type: agentic
      goober: curator
      goal: Triage, label, and de-duplicate the claimed backlog items.
      capabilities:
        - github:issues:write
      next: release-claim
    # Explicit release (issue #234): curation never opens a PR or closes the
    # issue, so issue-close-out's release never runs for it — without this
    # stage the claim sat held for the full lease even though curation's own
    # work on the item was already done. The issues capability also lets the
    # release clear the provider-visible claim marker before freeing the lease.
    - name: release-claim
      type: deterministic
      goal: Clear the provider claim marker and release this run's claim ledger lease.
      run:
        command: ["goobers", "backlog-query", "--release"]
      capabilities:
        - github:issues:write
      # Terminal: no `next`.
