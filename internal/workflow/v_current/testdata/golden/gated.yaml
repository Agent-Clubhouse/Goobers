apiVersion: goobers.dev/v1alpha1
kind: Workflow
dslVersion: "1.4"
metadata:
  name: golden-gated
spec:
  gaggle: golden
  triggers:
    - type: backlog-item
  start: implement
  tasks:
    - name: implement
      type: agentic
      goober: coder
      goal: Implement the item.
      next: review
  gates:
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        pass: ""
        fail: "@abort"
        needs-changes: implement
