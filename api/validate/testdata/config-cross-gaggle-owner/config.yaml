apiVersion: goobers.dev/v1alpha1
kind: Manifest
metadata:
  name: cross-gaggle-owner
spec:
  instance:
    name: cross-gaggle-owner
    environment: dev
  gaggles:
    - alpha
    - beta
---
apiVersion: goobers.dev/v1alpha1
kind: Gaggle
metadata:
  name: alpha
spec:
  project:
    provider: github
    owner: example
    name: alpha
  backlog:
    provider: github
    project: example/alpha
  isolation:
    namespace: alpha
---
apiVersion: goobers.dev/v1alpha1
kind: Gaggle
metadata:
  name: beta
spec:
  project:
    provider: github
    owner: example
    name: beta
  backlog:
    provider: github
    project: example/beta
  isolation:
    namespace: beta
---
apiVersion: goobers.dev/v1alpha1
kind: Goober
metadata:
  name: reviewer
spec:
  gaggle: beta
  role: reviewer
  instructions: config.yaml
---
apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: deploy
spec:
  gaggle: alpha
  triggers:
    - type: manual
  start: review
  tasks:
    - name: review
      type: agentic
      goober: reviewer
      goal: Review the deployment.
      next: approve
  gates:
    - name: approve
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        pass: ""
