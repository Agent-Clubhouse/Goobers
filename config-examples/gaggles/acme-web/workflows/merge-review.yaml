apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: merge-review
spec:
  gaggle: acme-web
  displayName: Merge review (PR-lifecycle decider)
  # Review one eligible PR with all other open PRs as integration context.
  # A pass enters the explicitly capability-gated merge/post-merge chain;
  # other outcomes become PR feedback for remediation or a human.
  triggers:
    - type: schedule
      schedule: "23 * * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 2
  start: pr-select
  tasks:
    - name: pr-select
      type: deterministic
      goal: Select one eligible open PR for holistic review.
      run:
        command: ["goobers", "pr-select"]
      inputs:
        resultFile: "selected-pr.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - number
        - head
        - base
      next: gather-sibling-context

    - name: gather-sibling-context
      type: deterministic
      goal: Load the other open PRs' touched files + state as review evidence.
      run:
        command: ["goobers", "gather-sibling-context"]
      inputsFrom:
        selectedNumber: number
      inputs:
        resultFile: "sibling-context.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - reviewDigest
      next: review

    - name: apply-verdict
      type: deterministic
      goal: Apply the review verdict's label + PR comment.
      run:
        command: ["goobers", "apply-verdict"]
      inputsFrom:
        selectedNumber: selectedNumber
        reviewDigest: reviewDigest
      capabilities:
        - github:pr:write

    # #833: deterministic cross-PR winner-election. Crowns one lander of a
    # mutually-sibling-blocked cluster (lowest PR number) and routes it into
    # merge-pr; everything else flows to apply-verdict and parks.
    - name: elect-lander
      type: deterministic
      goal: Elect one lander from a mutually-sibling-blocked cluster, or park the rest.
      run:
        command: ["goobers", "elect-lander"]
      inputsFrom:
        selectedNumber: selectedNumber
        selectedHeadSha: selectedHeadSha
        selectedBaseSha: selectedBaseSha
        reviewDigest: reviewDigest
      inputs:
        # #834: lander-election policy — "fifo" (lowest PR#, default) or
        # "newest" (highest PR#). Unknown values fall back to fifo.
        electionPolicy: "fifo"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - elected
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - reviewDigest
      next: elect-gate

    - name: merge-pr
      type: deterministic
      goal: Land the selected PR only when every independent safety conjunct still holds.
      run:
        command: ["goobers", "merge-pr"]
      inputsFrom:
        pullNumber: selectedNumber
        headSha: selectedHeadSha
        baseSha: selectedBaseSha
      inputs:
        verdict: "pass"
        # Set true to evaluate without attempting a merge. The merge capability
        # is still required because admission always fails closed.
        advisoryMode: "false"
        resultFile: "merge-result.json"
      capabilities:
        # INSTANCE OPT-IN: this per-workflow grant enables auto-merge. Without
        # it, remove this three-stage chain and route review:pass directly to
        # apply-verdict; merge-pr never acquires merge authority implicitly.
        - github:pr:merge
      expectedOutputs:
        - selectedNumber
        - merged
      next: merge-gate

    - name: queue-watch
      type: deterministic
      goal: Watch a merge-queue-enqueued PR until the queue merges or evicts it.
      run:
        command: ["goobers", "merge-queue-poll"]
      inputsFrom:
        pullNumber: selectedNumber
      inputs:
        resultFile: "queue-result.json"
      capabilities:
        - github:pr:merge
        - github:issues:write
      expectedOutputs:
        - selectedNumber
        - queueOutcome
      next: queue-gate

    - name: post-merge
      type: deterministic
      goal: Close referenced issues and mark now-behind sibling PRs for remediation.
      run:
        command: ["goobers", "post-merge"]
      inputsFrom:
        pullNumber: selectedNumber
      capabilities:
        - github:pr:write
        - github:issues:write

  gates:
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        pass: merge-pr
        # #833: needs-changes routes through elect-lander (winner-election) first.
        needs-changes: elect-lander
        fail: apply-verdict

    - name: elect-gate
      # #833: elected=true -> merge-pr (crowned lander; merge-pr re-verifies every
      # safety conjunct), elected=false -> apply-verdict (park blocked-on-sibling /
      # needs-remediation).
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: elected
          equals: "true"
      branches:
        pass: merge-pr
        fail: apply-verdict

    - name: merge-gate
      # Distinguishes an actual merge from a merge-queue enqueue (issue
      # #758) — a plain output-equals(merged==true) would conflate
      # "enqueued, not yet merged" with the refusal case.
      evaluator: automated
      automated:
        check: land-outcome
      branches:
        merged: post-merge
        enqueued: queue-watch
        # Keep changed CI/draft state unlabeled so a later run can retry after
        # the PR becomes eligible again.
        fail: ""

    - name: queue-gate
      evaluator: automated
      automated:
        check: queue-outcome
      branches:
        merged: post-merge
        evicted: ""
        timeout: ""
        fail: ""
