apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: merge-review
spec:
  gaggle: acme-web
  displayName: Merge review (PR-lifecycle decider)
  # Review one eligible PR with all other open PRs as integration context.
  # A pass enters the explicitly capability-gated merge/post-merge chain;
  # other outcomes become PR feedback for remediation or a human.
  triggers:
    - type: schedule
      schedule: "23 * * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 2
  start: pr-select
  tasks:
    - name: pr-select
      type: deterministic
      goal: Select one eligible open PR for holistic review.
      run:
        command: ["goobers", "pr-select"]
      inputs:
        headPrefix: "goobers/implementation/"
        resultFile: "selected-pr.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - number
        - head
        - base
      next: gather-sibling-context

    - name: gather-sibling-context
      type: deterministic
      goal: Load the other open PRs' touched files + state as review evidence.
      run:
        command: ["goobers", "gather-sibling-context"]
      inputsFrom:
        selectedNumber: number
      inputs:
        resultFile: "sibling-context.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - reviewDigest
        # #990: deterministic file-overlap set, threaded to elect-lander +
        # apply-verdict. Empty string when nothing overlaps.
        - overlappingSiblingsCsv
      next: review

    - name: apply-verdict
      type: deterministic
      goal: Publish the verdict as a native review and retain non-pass remediation handoffs.
      run:
        command: ["goobers", "apply-verdict"]
      inputsFrom:
        selectedNumber: selectedNumber
        # The deterministic gather outputs are authoritative; verdict SHAs are
        # only an optional cross-check against this pin.
        selectedHeadSha: selectedHeadSha
        selectedBaseSha: selectedBaseSha
        reviewDigest: reviewDigest
        # #990: same deterministic overlap set the election used.
        overlappingSiblings: overlappingSiblingsCsv
      inputs:
        resultFile: "verdict-result.json"
        # MUST match elect-lander's electionPolicy. apply-verdict re-derives
        # the election rather than receiving it: `elected` is emitted only by
        # elect-lander, and this stage is also reached straight from the review
        # gate, where a single-hop inputsFrom edge would fail closed.
        electionPolicy: "fifo"
      capabilities:
        - github:pr:write
        - github:pr:review
      expectedOutputs:
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - decision
        - verdictAuthor
      next: published-verdict

    # #833: deterministic cross-PR winner-election. Crowns one lander of a
    # mutually-sibling-blocked cluster (lowest PR number) and routes it into
    # merge-pr; everything else flows to apply-verdict and parks.
    - name: elect-lander
      type: deterministic
      goal: Elect one lander from a mutually-sibling-blocked cluster, or park the rest.
      run:
        command: ["goobers", "elect-lander"]
      inputsFrom:
        selectedNumber: selectedNumber
        selectedHeadSha: selectedHeadSha
        selectedBaseSha: selectedBaseSha
        reviewDigest: reviewDigest
        # #990: deterministic overlap set; passed through below for apply-verdict.
        overlappingSiblings: overlappingSiblingsCsv
      inputs:
        # Outputs reach the runner ONLY through a declared result file — a
        # stage without one always reports empty Outputs, however much its
        # expectedOutputs promises.
        resultFile: "election.json"
        # #834: lander-election policy — "fifo" (lowest PR#, default) or
        # "newest" (highest PR#). Unknown values fall back to fifo.
        electionPolicy: "fifo"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - elected
        - selectedNumber
        - selectedHeadSha
        - selectedBaseSha
        - reviewDigest
        # Passed through for apply-verdict on the parked branch (#990).
        - overlappingSiblingsCsv
      next: elect-gate

    - name: merge-pr
      type: deterministic
      goal: Land the selected PR only when every independent safety conjunct still holds.
      run:
        command: ["goobers", "merge-pr"]
      inputsFrom:
        pullNumber: selectedNumber
        headSha: selectedHeadSha
        baseSha: selectedBaseSha
        # apply-verdict resolves this with its github:pr:write credential, the
        # identity that actually owns the sticky verdict. Keep merge-pr scoped
        # to github:pr:merge instead of injecting the broader posting token.
        verdictAuthor: verdictAuthor
      inputs:
        verdict: "pass"
        # Set true to evaluate without attempting a merge. The merge capability
        # is still required because admission always fails closed.
        advisoryMode: "false"
        resultFile: "merge-result.json"
      capabilities:
        # INSTANCE OPT-IN: this per-workflow grant enables auto-merge. Without
        # it, remove this three-stage chain and route review:pass directly to
        # apply-verdict; merge-pr never acquires merge authority implicitly.
        - github:pr:merge
        # github:branch:delete lets post-merge cleanupMergedBranch delete the
        # merged head branch instead of failing closed and leaking it (#1075).
        - github:branch:delete
      expectedOutputs:
        - selectedNumber
        - merged
      next: merge-gate

    - name: queue-watch
      type: deterministic
      goal: Watch a merge-queue-enqueued PR until the queue merges or evicts it.
      run:
        command: ["goobers", "merge-queue-poll"]
      inputsFrom:
        pullNumber: selectedNumber
      inputs:
        resultFile: "queue-result.json"
        # A merge queue runs a full combined build against the projected
        # merge state, which routinely outlasts the executor's 10-minute
        # default stage timeout. Without an explicit budget here the stage
        # is killed long before the queue resolves, so the run never
        # observes the merge and post-merge (branch cleanup, issue
        # close-out, sibling fan-out) never runs for a PR that did in fact
        # land (#886).
        #
        # The stage timeout must exceed the poll timeout: merge-queue-poll
        # clamps its own poll to a margin inside whichever stage budget is
        # in effect (#884), so declaring only one of the two silently caps
        # the other.
        pollTimeoutSeconds: "25m"
        timeout: "30m"
      capabilities:
        - github:pr:merge
        - github:issues:write
        # github:branch:delete: queue-watch runs the same post-merge
        # cleanupMergedBranch as merge-pr when the queue reports merged (#1075).
        - github:branch:delete
      expectedOutputs:
        - selectedNumber
        - queueOutcome
      next: queue-gate

    - name: post-merge
      type: deterministic
      goal: Close referenced issues and mark now-behind sibling PRs for remediation.
      run:
        command: ["goobers", "post-merge"]
      inputsFrom:
        pullNumber: selectedNumber
      capabilities:
        - github:pr:write
        - github:issues:write

  gates:
    - name: review
      evaluator: agentic
      agentic:
        goober: reviewer
      branches:
        # #825: a pass enters apply-verdict too (every verdict is published
        # as a native GitHub review before any merge decision) —
        # published-verdict then gates the actual merge.
        pass: apply-verdict
        # #833: needs-changes routes through elect-lander (winner-election) first.
        needs-changes: elect-lander
        fail: apply-verdict

    - name: elect-gate
      # #833: BOTH branches route to apply-verdict. Election means "stop
      # counting those siblings as blockers", not "merge regardless of
      # review", so it resolves into an ordinary verdict rather than a
      # separate merge authority — apply-verdict derives the pass itself
      # (electedLanderPass) and published-verdict routes it onward to
      # merge-pr on the same run.
      #
      # The former elected=true -> merge-pr bypass could not actually work:
      # merge-pr builds its commit message from a `pass` verdict comment
      # pinned to the current SHAs, and the bypass posted no verdict comment
      # at all, so merge-pr exited 1 every cycle. It also satisfied its
      # "reviewed favorably" conjunct from the hardcoded `verdict: "pass"`
      # input rather than the real verdict.
      #
      # elected=false -> apply-verdict unchanged (park blocked-on-sibling /
      # needs-remediation).
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: elected
          equals: "true"
      branches:
        pass: apply-verdict
        fail: apply-verdict

    - name: published-verdict
      evaluator: automated
      automated:
        check: output-equals
        params:
          key: decision
          equals: pass
      branches:
        pass: merge-pr
        fail: ""

    - name: merge-gate
      # Distinguishes an actual merge from a merge-queue enqueue (issue
      # #758) — a plain output-equals(merged==true) would conflate
      # "enqueued, not yet merged" with the refusal case.
      evaluator: automated
      automated:
        check: land-outcome
      branches:
        merged: post-merge
        enqueued: queue-watch
        # Keep changed CI/draft state unlabeled so a later run can retry after
        # the PR becomes eligible again.
        fail: ""

    - name: queue-gate
      evaluator: automated
      automated:
        check: queue-outcome
      branches:
        merged: post-merge
        evicted: ""
        timeout: ""
        fail: ""
