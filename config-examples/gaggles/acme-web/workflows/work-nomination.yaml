apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: work-nomination
spec:
  gaggle: acme-web
  displayName: Work nomination
  # Producer workflow (ARCHITECTURE.md §7, §8, §12; WF-055): a cron trigger
  # wakes this workflow. It materializes the telemetry query surface (#24) as
  # an artifact, then a nominator goober analyzes that artifact plus a
  # read-only checkout for coverage gaps, perf smells, and recurring errors,
  # and files evidence-backed issues. Composes with backlog-curation (#25):
  # nominated issues land unclaimed and unapproved, so a maintainer applies
  # goobers:approved before curation's query-backlog stage will ever claim
  # them (SEC-047) — nomination proposes, it never fast-tracks its own work
  # past the trust gate.
  triggers:
    - type: schedule
      schedule: "43 7 * * *"
  readiness:
    maxConcurrentRuns: 1
    maxRunsPerHour: 1
  start: gather-signals
  tasks:
    # Deterministic: applies typed thresholds to the telemetry rollup and
    # materializes the versioned candidate-findings connector artifact. The
    # agent receives only the bounded findings and their journal pointers,
    # rather than live rollup access (ARCHITECTURE.md §5).
    - name: gather-signals
      type: deterministic
      goal: Materialize threshold-crossing telemetry findings with journal evidence for the nominator.
      run:
        command: ["goobers", "telemetry-query", "--window", "24h", "--aggregate", "stage-failure-rate", "--aggregate", "error-signature", "--aggregate", "gate-noise", "--format", "candidate-findings"]
      inputs:
        # Without this the expectedOutputs below emit nothing: a shell stage's
        # outputs are harvested only from its declared result file, so
        # nominate would find no candidate-findings artifact to analyze at all
        # (#900 — the same defect that stalled merge-review's elect-lander).
        resultFile: "candidate-findings.json"
      capabilities:
        - telemetry:read
      expectedOutputs:
        - candidate-findings
      next: nominate
    # Agentic: reads the candidate-findings artifact plus a read-only checkout,
    # dedupes against already-open goobers:nominated issues (query first —
    # issue #26 scope), and files well-formed issues up to the configured
    # per-run cap. Issues-only — no push/PR capability granted: this workflow
    # proposes work, it never touches code (issue #26: "writes issues only —
    # never code").
    - name: nominate
      type: agentic
      goober: nominator
      goal: >-
        Analyze the candidate-findings artifact and a read-only checkout for
        genuine coverage gaps and recurring failure or gate-noise patterns.
        Query existing goobers:nominated issues first and skip
        anything already covered within the dedupe window. File a
        well-formed issue for each remaining gap: evidence pointers or a
        repro, a proposed scope, and an acceptance sketch. Stop at the
        configured per-run cap.
      capabilities:
        - repo:read
        - telemetry:read
        - github:issues:write
      policyActions:
        - comment-on-issue
        - create-issue
        - label-issue
      inputs:
        # Noise controls (issue #26 scope): bound how many issues one run may
        # file, and how far back "already covered" looks when deduping.
        maxNominationsPerRun: "5"
        dedupeWindowDays: "14"
      # No structured output: each nomination is already filed as a GitHub
      # issue, and a result's `outputs` are scalar-only (#302). The scalar
      # `summary` in the result envelope carries the run's counts.
      # Terminal: no `next`.
