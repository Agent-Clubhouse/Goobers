apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: default-implement
spec:
  gaggle: acme-web
  displayName: Default (implement-only)
  # The default starter is intentionally manual-only so a fresh install never
  # starts provider work without an operator action. Run it explicitly with
  # `goobers run default-implement`; query-backlog then claims one
  # maintainer-approved item before the coder runs.
  triggers:
    - type: manual
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim one approved backlog item to implement.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
      policyActions:
        - claim-backlog-items
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: coder
      goal: Implement the backlog item and open a PR.
      expectedOutputs:
        - pull-request
      # No `next` — this is the single, terminal state of the workflow.
