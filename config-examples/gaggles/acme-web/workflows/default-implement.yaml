apiVersion: goobers.dev/v1alpha1
kind: Workflow
metadata:
  name: default-implement
spec:
  gaggle: acme-web
  displayName: Default (implement-only)
  # The default starter polls for maintainer-approved backlog work, claims one,
  # and publishes the coder's committed change as a PR before marking the issue
  # in review. Author richer workflows by adding tests and reviewer gates.
  triggers:
    - type: backlog-item
      selector:
        goobers: "true"
  readiness:
    maxConcurrentRuns: 1
  start: query-backlog
  tasks:
    - name: query-backlog
      type: deterministic
      goal: Claim one approved backlog item to implement.
      run:
        command: ["goobers", "backlog-query", "--claim"]
      inputs:
        trustLabel: "goobers"
        maxItems: "1"
        resultFile: "claimed-item.json"
      capabilities:
        - github:issues:write
        - github:pr:write
      expectedOutputs:
        - claimed-item
      next: implement
    - name: implement
      type: agentic
      goober: coder
      goal: Implement the backlog item and commit the change.
      capabilities:
        - repo:push
      next: push-branch
    - name: push-branch
      type: deterministic
      goal: Push the committed change to the run's branch.
      run:
        command: ["goobers", "push-branch"]
      capabilities:
        - repo:push
      next: open-pr
    - name: open-pr
      type: deterministic
      goal: Open or update the PR for the run's branch.
      run:
        command: ["goobers", "open-pr"]
      inputs:
        resultFile: "pr-result.json"
      capabilities:
        - github:pr:write
      expectedOutputs:
        - pull-request-url
        - prNumber
      next: close-out
    - name: close-out
      type: deterministic
      goal: Mark the implemented backlog item in review and release its claim.
      run:
        command: ["goobers", "issue-close-out"]
      inputs:
        status: "in-review"
      capabilities:
        - github:issues:write
